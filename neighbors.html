        { text: "Negotiate. Ask James to relocate the garden to another part of the lot. Compromise, even when it hurts.", key:'relocate', effects:{cohesion:4,eleanor:-4,james:-2,maria:2} },
        { text: "Let it go. The garden is land. What you grew there lives in the people who grew it.", key:'release', effects:{cohesion:1,eleanor:-10,james:4,tom:2} }
      ],
      consequences: {
        fight: { text: `You organize. You call the fourteen gardeners. You call the seniors. You call the Courier. You call the county historical preservation office, because a cherry tree planted in memory of a veteran might qualify for protection. (It doesn't. But the call buys time.)\n\nThe "Save the Garden" meeting draws forty people, which is more than any of James's development presentations. You stand at the front and you don't talk about square footage or property rights. You talk about Margaret Hollis, who grows tomatoes every year and brings them to the library. About the man from the VA who comes every Saturday and doesn't talk and doesn't need to. About Harold's cherry tree.\n\nJames sits in the back. His face is unreadable. Tom sits in the middle, looking like a man who wishes he were anywhere else.\n\nThe fight is real. The outcome is uncertain. But the garden, for this week at least, is visible to people who walk past it every day without seeing it.`, ripple: `What you don't know: James goes home and calls his mother. "There's a woman fighting to save a community garden on the lot I'm developing." His mother says: "Is it a good garden?" "It has a cherry tree planted for a dead veteran." His mother is quiet. "James. Find another way."\n\nMaria drives past the garden on her way home. The "Save the Garden" sign is visible from the road. She thinks about her restaurant, about the things you build that other people can decide to take. She adds her name to Eleanor's petition without being asked.` },
        relocate: { text: `You go to James with a proposal: relocate the garden to the north end of the lot. It's smaller. You lose eight plots. The cherry tree can't be moved. But fourteen gardeners keep gardening and the development proceeds.\n\n"I can do that," James says. And he means it. You can tell because he looks relieved rather than victorious. This is a man who didn't want to destroy a garden. He just didn't think to ask about it.\n\nYou spend a Saturday with a tape measure and a notebook, redesigning the garden for a smaller space. The new layout is efficient. Six raised beds instead of twenty-seven plots. A shared tool shed. A bench Harold would have liked, under a different tree.\n\nIt's not the same. It's not nothing either. You stand in the new space and think about what you keep and what you release and whether the difference is always as clear as you want it to be.`, ripple: `What you don't know: Tom hears about the compromise and tells Carol. Carol says: "That must have been hard for her. The cherry tree." Tom says: "What cherry tree?" Carol tells him about Harold, about the memorial, about the tree that can't be moved. Tom didn't know. He's on the council. He votes on the lot. And he didn't know about the tree.\n\nThe realization sits with him: how much of this town's life happens in the gaps between what he knows and what's actually there.` },
        release: { text: `You go to the garden on a Sunday morning. Early, before anyone else. You kneel by Harold's cherry tree and put your hand on the bark and say: "I'm sorry, love. They need the space."\n\nThe tree doesn't answer. Trees don't answer. But the bark is warm from yesterday's sun and the leaves move in a way that doesn't mean anything but feels like something.\n\nYou tell the gardeners at Saturday's meeting. Some cry. Margaret Hollis says: "Where will I grow my tomatoes?" and the question isn't really about tomatoes and everyone knows it.\n\nYou offer to help anyone who wants to start a plot at their own home. You draw diagrams on napkins. You give away your tools. The community garden disperses into fourteen smaller gardens across town, which is less efficient and more resilient and you're not sure if that's a victory or a defeat.\n\nJames sends you a note: "I'm sorry about the tree." You believe him.`, ripple: `What you don't know: six months later, the development is under construction. Where the garden was, there's a foundation. But in fourteen yards across Millbrook, tomatoes are growing. Margaret Hollis has the best crop of her life. She brings a bag to Zara's classroom. The kids try cherry tomatoes for the first time. Marcus eats seven.\n\nThe garden didn't survive. What it taught people did. Eleanor doesn't know this yet. She will, eventually, when Margaret shows up at her door with a jar of sauce and says: "From my garden. Because of yours."` }
      }
    },
    { id:'final_speech', title:'The Final Meeting',
      context: () => {
        const c = S.cohesion;
        let text = `It's November. The year's decisions have settled into the landscape of the town like weather. You can see it in who comes to meetings and who doesn't. In who says hello on the street and who crosses to the other side.\n\n`;
        if (c >= 65) text += `Something has shifted. Not dramatically. Dramatically isn't how towns change. More like: a door that was closed is now open a crack. People who didn't talk are talking. The temperature is different.`;
        else if (c >= 45) text += `The town is holding. That's the most accurate word. Not thriving. Not failing. Holding, the way a structure holds when the foundation has cracks but the walls are still standing. For now.`;
        else text += `The town is pulling apart. You can feel it. The council meetings have gotten quieter, which is worse than loud. Loud means people still care enough to fight. Quiet means they've stopped believing the fight matters.`;
        text += `\n\nThe council has one more meeting of the year. You weren't planning to attend. Then you changed your mind.`;
        return text;
      },
      options: [
        { text: "Read every name. Every person you've watched this year, what they sacrificed, what it cost them, what they built anyway.", key:'names', effects:{cohesion:4,eleanor:-3,tom:2,maria:3,zara:3,james:2} },
        { text: "Propose the compact. A one-page document: how we treat each other in this town. Not a law. A promise.", key:'compact', effects:{cohesion:6,eleanor:-5,tom:0,james:3,maria:3} },
        { text: "Say nothing. Sit in the gallery. Let your presence be the statement. You've earned the right to be here without speaking.", key:'silent', effects:{cohesion:1,eleanor:6,tom:0,maria:0} }
      ],
      consequences: {
        names: { text: `You stand at the microphone. You don't have notes. You have seventy-one years.\n\n"Maria Reyes has been in this town for fifteen years. She feeds us. She was asked to stop playing music and she made a choice about that and it cost her either way. Her daughter wrote an essay about belonging and the fact that a twelve-year-old had to write that essay is on all of us."\n\nThe room is very quiet.\n\n"Tom Kovacs has been on this council for six years. He takes care of his wife. He makes budget decisions that keep him up at night. He is trying to keep this town alive and he is doing it while carrying more weight than most of you know."\n\nTom looks at his hands.\n\n"Zara Washington moved here because nobody else applied for the job. She buys her own classroom supplies. She stays because the children need her. We should be asking why nobody else applied. We should be embarrassed by the answer."\n\n"James Chen put two years of his life and his own money into a proposal for this town. You can disagree with his project. You cannot say he doesn't care."\n\nYou pause. "I kept a garden on land I didn't own. I'm not better than anyone in this room. But I've been here long enough to know: every person I just named is trying. That's all any of us can do. Try, and see each other trying, and not look away."\n\nThe room is silent. Then Maria stands up, in the back, and starts clapping. One person. Then Tom. Then Zara. Then it doesn't matter who's clapping because the sound fills the room and it's not resolution and it's not forgiveness and it's not enough. But it's not nothing.`, ripple: `` },
        compact: { text: `You wrote it longhand. One page.\n\nTHE MILLBROOK COMPACT\n\nWe are neighbors. We will not always agree. We commit to the following:\n\n1. When a decision affects someone, we will hear from them before we decide.\n2. We will not let disagreement become silence.\n3. We will remember that everyone in this town is carrying something we cannot see.\n4. We will protect what we've built and make room for what's coming.\n5. This town belongs to everyone who tends it.\n\nMaria types it. Zara edits it. Tom presents it. James prints it on heavy paper. It hangs in the community center next to the fire exit map.\n\nNobody will remember the exact words in five years. That's fine. What they'll remember is the meeting where five people who disagreed about almost everything managed to agree on how to disagree.\n\nThat's what a town is. Not the buildings. The agreement to keep trying.`, ripple: `` },
        silent: { text: `You sit in the third row. You watch.\n\nTom presents the year-end budget. James gives an update on the project timeline. Two residents speak during public comment, about potholes and a broken streetlight. The ordinary machinery of a town that's still running.\n\nYou could speak. You have things to say. You always have things to say. But tonight you sit and you watch the room and you notice things:\n\nMaria is in the back row. She came. That means something.\n\nZara is here too, which means she got a babysitter for her evening, which means she chose this over rest, which is a cost nobody acknowledges.\n\nJames is sitting next to Tom. They weren't sitting together at the beginning of the year.\n\nThe meeting ends. People file out. Nobody marks Eleanor Price's presence. She didn't speak. She didn't need to. She showed up. At seventy-one, after everything, she showed up.\n\nSome things are said by being in the room.`, ripple: `` }
      }
    }
  ]
};

// --- ENGINE ---
function showTitle() {
  app.innerHTML = `<div class="title-screen"><h1>Neighbors</h1><div class="sub">Five people. One town. One year of decisions.<br><br>You'll play each of them. No one is the villain.<br>Everyone has their reasons. Not all of them are visible from where they're standing.</div><button onclick="startGame()">Begin</button></div>`;
}

function startGame() {
  S = { round:0, decisions:{}, cohesion:60, personal:{maria:60,tom:60,zara:60,james:60,eleanor:60}, log:[] };
  nextRound();
}

function nextRound() {
  if (S.round >= CHARS.length) { showTimeline(); return; }
  const char = CHARS[S.round];
  document.documentElement.style.setProperty('--accent', char.color);
  if (S.round > 0) showShift(char); else showChar(char);
}

function showShift(char) {
  const prev = CHARS[S.round - 1];
  // Summarize what happened in previous round
  const prevLogs = S.log.filter(l => l.char === prev.id);
  let summaryHtml = '';
  if (prevLogs.length > 0) {
    summaryHtml = `<div class="prev-summary"><strong>What ${prev.name} chose:</strong><br>`;
    summaryHtml += prevLogs.map(l => `${l.ripple}`).join('<br>');
    summaryHtml += '</div>';
  }

  app.innerHTML = `<div class="shift"><div class="sep">* * *</div><h2>Perspective Shift</h2><p>Same town. Different life.<br>The decisions already made will look different from here.</p>${summaryHtml}<p style="font-size:17px;color:var(--text);margin-bottom:24px;">You are now <strong style="color:var(--accent)">${char.name}</strong>.</p><button onclick="showChar(CHARS[${S.round}])">Continue</button></div>`;
  window.scrollTo(0, 0);
}

window.showChar = function(char) {
  let html = `<div class="char-intro"><div class="char-header"><div class="char-avatar" style="background:${char.color}">${char.initial}</div><div><div class="char-name">${char.name}</div><div class="char-role">${char.role}</div></div></div><div class="char-voice">${char.intro.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div></div>`;
  html += `<div id="decisions"></div>`;
  app.innerHTML = html;
  window.scrollTo(0, 0);
  showDecision(char, 0);
};

function showDecision(char, idx) {
  const decs = DECISIONS[char.id];
  if (idx >= decs.length) {
    document.getElementById('decisions').innerHTML += `<button class="continue-btn" onclick="finishRound()">Continue</button>`;
    return;
  }
  const dec = decs[idx];
  const ctx = typeof dec.context === 'function' ? dec.context() : dec.context;
  let html = `<div class="decision" id="dec-${idx}"><h3>${dec.title}</h3><div class="context">${ctx.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div><div class="choices" id="ch-${idx}">`;
  dec.options.forEach((opt, i) => {
    html += `<button class="choice-btn" onclick="choose('${char.id}',${idx},${i})">${opt.text}</button>`;
  });
  html += `</div></div>`;
  document.getElementById('decisions').innerHTML += html;
  setTimeout(() => { const el = document.getElementById(`dec-${idx}`); if (el) el.scrollIntoView({behavior:'smooth',block:'center'}); }, 200);
}

window.choose = function(charId, decIdx, optIdx) {
  const decs = DECISIONS[charId];
  const dec = decs[decIdx];
  const opt = dec.options[optIdx];
  const con = dec.consequences[opt.key];

  S.decisions[dec.id] = opt.key;
  S.cohesion = Math.max(0, Math.min(100, S.cohesion + (opt.effects.cohesion || 0)));
  for (const [k,v] of Object.entries(opt.effects)) {
    if (k !== 'cohesion' && S.personal[k] !== undefined) S.personal[k] = Math.max(0, Math.min(100, S.personal[k] + v));
  }
  S.log.push({ char:charId, decision:dec.title, ripple:opt.ripple || dec.title, effects:opt.effects });

  const chEl = document.getElementById(`ch-${decIdx}`);
  const char = CHARS.find(c=>c.id===charId);

  // Stage 1: Show consequence
  let conHtml = `<div class="consequence" id="con-${decIdx}">${con.text.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div>`;
  chEl.innerHTML = conHtml;

  // Scroll to consequence
  setTimeout(() => {
    const conEl = document.getElementById(`con-${decIdx}`);
    if (conEl) conEl.scrollIntoView({behavior:'smooth',block:'start'});
  }, 100);

  if (con.ripple) {
    // Stage 2: After a pause, show the ripple section
    setTimeout(() => {
      const conEl = document.getElementById(`con-${decIdx}`);
      const rippleHtml = `<div class="ripple-section" id="ripple-${decIdx}"><div class="ripple-label">What you don't know</div>${con.ripple.split('\n\n').map(p=>`<p>${p}</p>`).join('')}</div>`;
      conEl.insertAdjacentHTML('afterend', rippleHtml);
      // Scroll to ripple
      setTimeout(() => {
        const rippleEl = document.getElementById(`ripple-${decIdx}`);
        if (rippleEl) rippleEl.scrollIntoView({behavior:'smooth',block:'center'});
      }, 200);
      // Stage 3: After another pause, show continue button
      setTimeout(() => {
        const rippleEl = document.getElementById(`ripple-${decIdx}`);
        const btnHtml = `<button class="next-btn" onclick="this.remove();showDecision(CHARS[${CHARS.indexOf(char)}],${decIdx+1})">Continue</button>`;
        rippleEl.insertAdjacentHTML('afterend', btnHtml);
      }, 800);
    }, 1500);
  } else {
    // No ripple: just show continue button after a beat
    setTimeout(() => {
      const conEl = document.getElementById(`con-${decIdx}`);
      const btnHtml = `<button class="next-btn" onclick="this.remove();showDecision(CHARS[${CHARS.indexOf(char)}],${decIdx+1})">Continue</button>`;
      conEl.insertAdjacentHTML('afterend', btnHtml);
    }, 600);
  }
};

function finishRound() { S.round++; nextRound(); }

function getEpilogues() {
  const p = S.personal;
  const c = S.cohesion;
  const d = S.decisions;
  const ep = {};

  // MARIA
  if (p.maria >= 65) {
    ep.maria = d.marias_offer === 'yes'
      ? `<p>La Mesa survived the construction. The community kitchen opened in September, and by October Maria was catering three events a week. She hired a sous chef, a kid from the community college who reminds her of herself at twenty.</p><p>Sofia's essay won honorable mention in the state competition. Maria framed it and hung it next to the health inspection certificate. When customers ask about it, Sofia no longer looks embarrassed.</p><p>On Fridays, the music plays.</p>`
      : `<p>La Mesa survived. The regulars came back. Some new ones showed up. Maria refinanced the loan on better terms, partly because the bank officer had read about her in the Courier and partly because fifteen years of never missing a payment is its own argument.</p><p>She started a Saturday cooking class for kids. David is her assistant. Sofia pretends not to care but comes every week.</p><p>On Fridays, the music plays. A little louder than before.</p>`;
  } else if (p.maria >= 40) {
    ep.maria = `<p>La Mesa is still open. Some months are harder than others. Maria took on catering work to cover the gaps, which means she's in the kitchen from 5 AM to midnight most days. She doesn't complain. She's never complained. That's not the same as being okay.</p><p>Sofia started high school in the fall. She listed "Millbrook" as her hometown on the enrollment form, which Maria noticed and didn't mention and thought about for a week.</p><p>The music plays on Fridays. Quieter than it used to be. But it plays.</p>`;
  } else {
    ep.maria = `<p>La Mesa closed in November. The construction, the lost regulars, the noise complaint costs, the second mortgage she took to stay afloat. It was math, in the end. Math doesn't care about fifteen years.</p><p>Maria moved the family to her sister's place in Mississauga. She's working in someone else's kitchen now. Good restaurant. Good people. Not hers.</p><p>David still calls Millbrook "home" sometimes. He doesn't know he's doing it. Maria hears it every time.</p>`;
  }

  // TOM
  if (p.tom >= 65) {
    ep.tom = `<p>Carol's new medication got approved through the county health program that the fundraiser helped preserve. The bad days are still bad. But the good days are more frequent, and on the good days she sits on the porch and waves at the neighbors and Tom brings her coffee and stands there for a moment, just watching her drink it.</p><p>He ran for re-election and won. Unopposed, which in a town this size means either everyone trusts you or nobody cares enough to challenge you. He chooses to believe the first one.</p><p>He eats at La Mesa now. Every Thursday. He tells Carol the food is good. She says: "I know, Tom. I've been telling you for years."</p>`;
  } else if (p.tom >= 40) {
    ep.tom = `<p>Carol's condition stabilized. The medication costs didn't. Tom picked up a part-time security job at the county courthouse to cover the gap. He's sixty years old and working again, which he frames as "staying active" because the alternative framing is harder to say out loud.</p><p>He stepped down from the council. Not enough hours in the day. He misses it more than he expected. He doesn't miss the budget meetings. He misses the feeling that his decisions mattered to people other than himself.</p><p>He drives past La Mesa most days. Sometimes he goes in. Sometimes he doesn't. The distance between those two things is the distance he's still trying to close.</p>`;
  } else {
    ep.tom = `<p>Carol had a bad winter. The hospital bills stacked up. They sold the house, the one his father built the addition on in 1978, and moved into a two-bedroom rental on Oak Street. It's fine. It's clean and warm and fine.</p><p>Tom resigned from the council in January. The letter was three sentences. Thirty-one years of service and he couldn't find more than three sentences because anything longer would have been about how the town he gave his life to couldn't find $40,000 for the people who live in it.</p><p>He doesn't go to meetings anymore. He takes Carol to her appointments. He makes dinner. He watches the news. Some nights he sits on the porch of a house that isn't his and listens to the town he used to run.</p>`;
  }

  // ZARA
  if (p.zara >= 65) {
    ep.zara = `<p>Zara signed a three-year contract. The principal cried, which Zara wasn't expecting. "We've never had anyone stay," the principal said. Zara said: "I'm not most people." She was quoting herself and she knew it and it felt different the second time. More settled. Less defiant.</p><p>Marcus passed his reading assessment. Two grade levels up in one year. He still wears the blue parka. He told Zara he wants to be a teacher, and then immediately looked embarrassed, and she said: "I think you'd be a great one," and meant it with everything she has.</p><p>Sofia won an award for her writing. Zara keeps the certificate in her desk drawer, next to Mrs. Patterson's note. Evidence of what a classroom can do when someone stays.</p>`;
  } else if (p.zara >= 40) {
    ep.zara = `<p>Zara finished the school year. Some kids thrived. Some kids fell through the cracks she couldn't stretch far enough to cover. Marcus improved. Lily improved. Two others didn't, and she carries their names like stones in her pockets.</p><p>She's thinking about next year. She hasn't signed a contract. The principal asked. Zara said she needed time. What she needs is a reason to believe the system that underfunds her classroom will change. She hasn't found one yet.</p><p>She keeps the anonymous note from the parent and Mrs. Patterson's note side by side in her desk. Some days one is heavier. Some days the other. She hasn't decided which one defines this place.</p>`;
  } else {
    ep.zara = `<p>Zara left at the end of the school year. She packed her classroom in boxes on a Saturday when nobody was there because she didn't want the kids to see her leave. She left a note for each of them in their desks. Twenty-three notes. It took her all afternoon.</p><p>Marcus's note said: "You are smart and you are kind and you deserve a warm coat every winter. Don't let anyone tell you otherwise. Love, Ms. Washington."</p><p>The position went unfilled. Nobody applied. The principal combined the class with the third-grade room. Forty-one kids, one teacher, 2014 textbooks. Millbrook Elementary is still open. Whether it's still a school is a different question.</p>`;
  }

  // JAMES
  if (p.james >= 65) {
    ep.james = `<p>The project broke ground in April. Modified, phased, community-informed. Smaller than his original vision. Better than his original vision. He'll never say that to his investors, who see the thinner margins. He says it to himself, which is enough.</p><p>The community kitchen opened in September. Maria runs it. James stops by on Wednesday mornings for coffee before the contractors arrive. They argue about the ventilation system. It's the good kind of arguing.</p><p>His mother visited in October. She walked through the building and touched the walls and said: "This one feels like yours." He wasn't sure what she meant until he realized: it feels like the laundromat. Warm. Full of people who need to be here.</p>`;
  } else if (p.james >= 40) {
    ep.james = `<p>The project went forward. Smaller than planned. Two buildings instead of the full complex. The community room is the best part, which is something James wouldn't have predicted a year ago. He thought the apartments were the point. Turns out the room where people gather is the point.</p><p>His investors are neutral. Not thrilled, not angry. The returns are adequate. "Adequate" is the word that describes everything about the project: adequate housing, adequate margins, adequate impact. James lies awake some nights wondering if adequate is enough or if he settled.</p><p>He still eats at La Mesa. The food is still the best thing about this town.</p>`;
  } else {
    ep.james = `<p>The project stalled. Investors pulled out after the community opposition, the timeline delays, the cost overruns from modifications he made too late to matter. The lot sits empty. The architectural renderings are in a folder on his laptop he hasn't opened in months.</p><p>James moved to a new project in another town. Smaller, simpler, less personal. He doesn't drive through Millbrook anymore. Not because he's angry. Because the empty lot is the one thing he built that he can't stand to look at.</p><p>His mother asked how the town was doing. He said: "It's doing fine without me." She heard what he didn't say.</p>`;
  }

  // ELEANOR
  if (p.eleanor >= 65) {
    ep.eleanor = `<p>The garden survived. Not in its original form. Nothing survives in its original form. But the raised beds are full and Margaret Hollis grows tomatoes and the Saturday morning regulars still come with their coffee and their gossip and their extra seedlings.</p><p>Eleanor started a mentorship program: seniors paired with students from Zara's class. Harold would have called it "a library with dirt." She calls it "the most important thing I've done since the actual library."</p><p>She turns seventy-two in March. She has no plans to slow down. Slowing down is for people who've stopped paying attention, and Eleanor Price has never stopped paying attention to anything in her life.</p>`;
  } else if (p.eleanor >= 40) {
    ep.eleanor = `<p>Eleanor adapted. That's the word she uses. Not surrendered, not compromised. Adapted. The garden is smaller. The library hours are fewer. The town is changing in ways she doesn't always recognize. But she's still here, still tending what she can, still showing up on Saturday mornings.</p><p>Some days she feels like the last person who remembers what this town used to be. Other days she thinks maybe what it used to be wasn't as good as she remembers, and that's its own kind of loss: the loss of certainty that the past was better.</p><p>She keeps Harold's photo on the mantle. She talks to it sometimes. "You'd barely recognize the place, love. But then again, you always said that was the point of places. They keep becoming."</p>`;
  } else {
    ep.eleanor = `<p>The garden was paved in August. Eleanor watched the bulldozer from across the street. She didn't cry. She'd done her crying earlier, alone, at the cherry tree, the morning before the machines came.</p><p>She tends a window box now. Tomatoes and basil and a stubborn geranium. It's not the same. It's not nothing. She tells herself this on the mornings when it feels like nothing.</p><p>She stopped going to council meetings. Not in protest. She just doesn't see herself in the room anymore. The town she knew is becoming a town she doesn't, and the distance between those two towns grows a little wider every month, and she's too tired to keep building bridges across it.</p><p>Margaret Hollis brings her tomatoes from the backyard garden Eleanor helped her start. They sit on Eleanor's porch and eat them with salt and neither of them mentions the lot where the community garden used to be. Some absences are too large to name. You just live around them.</p>`;
  }

  return ep;
}

function showTimeline() {
  document.documentElement.style.setProperty('--accent', '#555');
  const c = Math.max(0, Math.min(100, S.cohesion));

  let closing;
  if (c >= 70) closing = `<p>The town held. Not because anyone was right, or because the decisions were optimal, or because the system worked. It held because enough people, at enough moments, chose to see past the edge of their own lives.</p><p>Maria still plays music on Fridays. Tom still worries about money. Zara still buys her own supplies. James still wants to build. Eleanor still tends what she can.</p><p>Nothing is solved. Everything is a little more honest. That's what community looks like from the inside: not resolution, but the willingness to keep showing up for people whose lives you don't fully understand.</p>`;
  else if (c >= 45) closing = `<p>The town survived the year. That's not nothing. The cracks are visible now, and cracks don't close on their own.</p><p>Every person you inhabited made decisions that seemed right from where they stood. That's the thing about perspective: from inside, every choice has reasons. From outside, every choice has costs.</p><p>The question was never who's right. The question is whether anyone is willing to walk next door and look through a window that isn't theirs.</p>`;
  else closing = `<p>The town is more divided than it was a year ago. Every decision that optimized for one person's perspective came at a cost to someone else's. The costs accumulated. The connections frayed.</p><p>Nobody was the villain. That's the hardest truth. Every choice you made, from every angle, had reasons. Real reasons. Reasons that were true and incomplete at the same time.</p><p>Tribalism isn't hate. It's not even selfishness. It's the inability to see past your own experience. And it breaks things. Not dramatically. Quietly. One invisible cost at a time.</p>`;

  let html = `<div class="sep">* * *</div><div class="timeline"><h2>One Year in Millbrook</h2>`;
  html += `<div class="final-text">${closing}</div>`;

  html += `<div class="metrics-panel"><h3>Where things stand</h3>`;
  html += `<div class="metric-row"><span class="label"><strong>Community Cohesion</strong></span><div class="bar"><div class="fill" style="width:${c}%;background:#666"></div></div><span class="val">${c}</span></div>`;
  for (const ch of CHARS) {
    const v = Math.max(0, Math.min(100, S.personal[ch.id]));
    html += `<div class="metric-row"><span class="label" style="color:${ch.color}">${ch.name}: ${ch.metric}</span><div class="bar"><div class="fill" style="width:${v}%;background:${ch.color}"></div></div><span class="val">${v}</span></div>`;
  }
  html += `</div>`;

  // --- EPILOGUE CARDS ---
  html += `<div class="sep">* * *</div>`;
  html += `<h2 style="font-size:18px;font-weight:300;text-align:center;margin:24px 0 20px;">What Happened Next</h2>`;

  const ep = getEpilogues();
  for (const ch of CHARS) {
    html += `<div class="epilogue-card"><div class="ep-header"><div class="ep-avatar" style="background:${ch.color}">${ch.initial}</div><span class="ep-name">${ch.name}</span></div><div class="ep-text">${ep[ch.id]}</div></div>`;
  }

  html += `<div class="sep">* * *</div>`;
  html += `<div class="final-text"><p>You were five people this year. You saw the noise complaint from the person being silenced and the person enforcing the rule. You saw the development from the person it displaces and the person who built it. You saw the school from the teacher who stays and the council that decides what a classroom is worth.</p><p>Each of them was you. Each of them was someone you might dismiss in a headline, or a comment section, or a conversation where you already know whose side you're on.</p><p>None of them were wrong. All of them were incomplete. That's the whole thing about neighbors: the walls between houses are thinner than we pretend.</p></div>`;

  html += `<button class="continue-btn" onclick="showTitle()">Play Again</button></div>`;
  app.innerHTML = html;
  window.scrollTo(0, 0);
}

showTitle();
</script>
</body>
</html>
