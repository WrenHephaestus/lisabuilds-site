// ====== DAWN PHASE ======
function runDawn() {
  setPhase('dawn');
  stopRain();
  setFog(Math.random() < 0.3);

  // Generate this week's weather
  if (state.nextWeekWeather) {
    state.weather = state.nextWeekWeather;
  } else {
    state.weather = generateWeather();
  }
  state.nextWeekWeather = generateWeather();
  state.weatherHistory.push(state.weather);

  // Chapel hope bonus
  if (state.chapelBuilt) {
    state.hope += 3;
  }

  updateResources();

  if (state.week > 20 && !state.gameOver) {
    return triggerEnding();
  }

  if (state.fuel <= 0) {
    return triggerEnding('dark');
  }

  if (state.hope <= 0) {
    return triggerEnding('alone');
  }

  const dawnMsg = DAWN_MESSAGES[Math.floor(Math.random() * DAWN_MESSAGES.length)];

  // Resource report
  const fuelStatus = state.fuel <= 15 ? '<span class="text-danger">critically low</span>' : state.fuel <= 30 ? '<span class="text-amber">running low</span>' : 'stable';
  const foodStatus = state.food <= 10 ? '<span class="text-danger">nearly gone</span>' : state.food <= 25 ? '<span class="text-amber">getting scarce</span>' : 'adequate';

  // Weather display
  const w = WEATHER_TYPES[state.weather];
  let weatherHTML = `<p class="weather-indicator" style="margin:0.5rem 0;">${w.icon} <strong>${w.name}</strong> — ${w.desc}</p>`;

  // Forecast if watchtower built
  let forecastHTML = '';
  if (state.watchtowerBuilt) {
    const nextW = WEATHER_TYPES[state.nextWeekWeather];
    forecastHTML = `<div class="forecast-box"><div class="forecast-label">Watchtower Forecast — Next Week</div>${nextW.icon} ${nextW.name}: ${nextW.desc}</div>`;
  }

  // Sound description for dawn
  const dawnSounds = [
    'The creak of the lighthouse mechanism winding down as morning light makes the beam unnecessary.',
    'Seabirds calling from the rocks below, their cries sharp against the murmur of retreating waves.',
    'The distant crash of waves against the far side of the reef, a sound so constant it becomes silence.',
    'Wind sighing through the gallery railing, a low, hollow note like someone blowing across the mouth of a bottle.',
    'The fire crackling in the keeper\'s quarters, embers popping and settling as the night\'s fuel burns low.'
  ];
  const soundHTML = `<p class="sound-text">${dawnSounds[Math.floor(Math.random() * dawnSounds.length)]}</p>`;

  // Check for journal discovery
  let journalDiscovery = '';
  const possibleJournals = JOURNAL_ENTRIES.filter(j => !state.journalFound.includes(j.id) && state.week >= j.week);
  if (possibleJournals.length > 0 && Math.random() < 0.35) {
    const found = possibleJournals[0];
    state.journalFound.push(found.id);
    journalDiscovery = `<p class="scene-text">While cleaning the lantern room, you find another page from the previous keeper's journal, pressed between the glass and the frame. "${found.title}" is written across the top in careful handwriting.</p>
    <p><em>(Check the Journal to read it.)</em></p>`;
  }

  // Messages washed ashore
  let shoreMessage = '';
  if (Math.random() < 0.25) {
    const messages = [
      'A bottle washes ashore. The note inside reads: "To whoever finds this: the light is visible from further than you think."',
      'Wreckage on the shore. A ship\'s nameplate reads "The Constancy." You do not recognize it from any vessel you have seen.',
      'A waterproof pouch on the rocks contains a handful of coins and a letter that has been read so many times the creases have worn through.',
      'You find a child\'s drawing sealed in wax. It shows a lighthouse with a yellow beam, and stick figures standing at its base. Everyone is smiling.',
      'A sealed jar of preserved fruit, still good. Someone packed this with love, and the sea delivered it to you.',
      'A piece of driftwood with words carved into it: "WE SAW YOUR LIGHT." Nothing else.',
    ];
    shoreMessage = `<p>${messages[Math.floor(Math.random() * messages.length)]}</p>`;
    if (Math.random() < 0.5) {
      state.food += 2;
      state.materials += 1;
    }
  }

  // Black Tide aftermath: survivors wash ashore
  let blackTideAftermath = '';
  if (state.specialEvents.blackTideAccepted && state.blackTideSurvivors.length > 0) {
    const survivors = state.blackTideSurvivors;
    survivors.forEach(s => {
      s.dialogueIndex = 0;
      state.population.push(s);
      state.assignments[s.name] = 'rest';
      state.trust[s.name] = 0;
    });
    state.blackTideSurvivors = [];

    blackTideAftermath = `
      <div class="event-alert">
        <p><strong>The morning brings what the darkness took.</strong></p>
        <p>Two figures wash ashore with the wreckage. A merchant vessel struck the rocks in the night, right where the beacon should have been. Where you turned it off.</p>
        <p><strong>Elise Marchetti</strong> and <strong>Rui Delgado</strong> cling to a broken mast. They are alive. Three of their crewmates are not.</p>
        <p>Elise looks at the lighthouse. The light is back on now. She says nothing. She does not need to.</p>
      </div>
      <p class="sound-text">The sound of wreckage grinding against rock. The sound of survivors coughing seawater. The sound of silence where three voices used to be.</p>`;
  }

  // Trust unlock check
  let trustUnlockHTML = '';
  const unlocks = checkTrustUnlocks();
  if (unlocks.length > 0) {
    const unlock = unlocks[0]; // Show one per dawn
    trustUnlockHTML = `
      <div class="event-alert event-alert-positive">
        <p><strong>A bond deepens.</strong> Your trust with ${unlock.person.name} has unlocked something new.</p>
      </div>`;
    // Store for use in day phase
    state._pendingTrustUnlock = unlock;
  }

  renderContent(`
    <div class="narrative fade-in">
      <h2>Dawn, Week ${state.week}</h2>

      ${soundHTML}

      <p>${dawnMsg}</p>

      ${weatherHTML}
      ${forecastHTML}

      <p>You check the stores. Fuel is ${fuelStatus}. Food is ${foodStatus}. ${state.population.length > 0 ? `${state.population.length} ${state.population.length === 1 ? 'soul' : 'souls'} depend on the island and its keeper.` : 'You are alone on the island.'}</p>

      ${blackTideAftermath}
      ${trustUnlockHTML}
      ${journalDiscovery}
      ${shoreMessage}

      <div class="choices">
        <button class="choice-btn" onclick="runDay()">
          The day awaits. Tend the island.
          <span class="choice-cost">Proceed to Day phase</span>
        </button>
      </div>
    </div>
  `);
}

// ====== DAY PHASE ======
function runDay() {
  setPhase('day');
  setFog(false);
  stopRain();

  // Build assignment UI
  let assignmentHTML = '';
  if (state.population.length > 0) {
    assignmentHTML = '<h3 style="font-size:1rem;color:var(--amber-soft);margin:1.5rem 0 0.5rem;">Assign Your People</h3>';
    assignmentHTML += '<div class="assignment-grid">';

    const tasks = ['fishing', 'building', 'tending lighthouse', 'scouting shore', 'farming', 'rest'];
    state.population.forEach(person => {
      const currentTask = state.assignments[person.name] || 'rest';
      let options = '';
      tasks.forEach(t => {
        const selected = t === currentTask ? ' selected' : '';
        options += `<option value="${t}"${selected}>${t}</option>`;
      });
      assignmentHTML += `<div class="assign-slot">
        <div class="slot-title">${person.name} (${person.skill})</div>
        <select onchange="assignTask('${person.name}', this.value)">${options}</select>
      </div>`;
    });
    assignmentHTML += '</div>';
  }

  // Build options
  let buildHTML = '';
  const availableBuildings = Object.entries(BUILDINGS).filter(([key, b]) => !state[b.stateKey]);
  if (availableBuildings.length > 0 && state.population.length > 0) {
    buildHTML = '<h3 style="font-size:1rem;color:var(--amber-soft);margin:1.5rem 0 0.5rem;">Build</h3>';
    buildHTML += '<div class="choices">';
    availableBuildings.forEach(([key, b]) => {
      const canAfford = state.materials >= b.cost.materials;
      const hasBuilder = state.population.some(p => p.skill === 'builder') || state.population.length >= 3;
      const disabled = (!canAfford || !hasBuilder) ? ' disabled' : '';
      const reason = !canAfford ? `Need ${b.cost.materials} materials (have ${state.materials})` : !hasBuilder ? 'Need a builder or 3+ people' : `Costs ${b.cost.materials} materials`;
      buildHTML += `<button class="choice-btn"${disabled} onclick="buildStructure('${key}')">
        Build ${b.name}: ${b.desc}
        <span class="choice-cost">${reason}</span>
      </button>`;
    });
    buildHTML += '</div>';
  }

  // Trust unlock event
  let trustUnlockHTML = '';
  if (state._pendingTrustUnlock) {
    const unlock = state._pendingTrustUnlock;
    trustUnlockHTML = `<h3 style="font-size:1rem;color:var(--amber-soft);margin:1.5rem 0 0.5rem;">A Bond Deepens — ${unlock.person.name}</h3>`;
    trustUnlockHTML += `<div class="narrative"><p>${unlock.text.replace(/\n\n/g, '</p><p>')}</p></div>`;
    trustUnlockHTML += '<div class="choices">';
    unlock.choices.forEach((choice, i) => {
      trustUnlockHTML += `<button class="choice-btn" onclick="resolveTrustUnlock(${i})">
        ${choice.text}
      </button>`;
    });
    trustUnlockHTML += '</div>';
    state._currentTrustChoices = unlock.choices;
  }

  // Conversation option
  let convoHTML = '';
  const talkable = state.population.filter(p => {
    if (!p.dialogueIndex) p.dialogueIndex = 0;
    return p.dialogueIndex < p.dialogues.length;
  });
  if (talkable.length > 0 || state.population.length > 0) {
    convoHTML = '<h3 style="font-size:1rem;color:var(--amber-soft);margin:1.5rem 0 0.5rem;">Talk to Someone</h3>';
    convoHTML += '<div class="choices">';
    state.population.forEach(p => {
      if (!p.dialogueIndex) p.dialogueIndex = 0;
      const trust = getTrust(p.name);
      const hasDialogue = p.dialogueIndex < p.dialogues.length;
      let trustNeeded = 0;
      if (p.dialogueIndex === 1) trustNeeded = 30;
      if (p.dialogueIndex === 2) trustNeeded = 60;
      const locked = trustNeeded > 0 && trust < trustNeeded;

      if (hasDialogue) {
        if (locked) {
          convoHTML += `<button class="choice-btn" disabled>
            Speak with ${p.name}
            <span class="choice-cost">${p.skill} / Trust: ${trust}/100 — Needs ${trustNeeded} trust for deeper conversation</span>
          </button>`;
        } else {
          convoHTML += `<button class="choice-btn" onclick="talkTo('${p.name}')">
            Speak with ${p.name}
            <span class="choice-cost">${p.skill} / ${p.mood} / Trust: ${trust}</span>
          </button>`;
        }
      } else if (trust < 100) {
        convoHTML += `<button class="choice-btn" onclick="spendTimeWith('${p.name}')">
            Spend time with ${p.name} (build trust)
            <span class="choice-cost">${p.skill} / Trust: ${trust}/100</span>
          </button>`;
      }
    });
    convoHTML += '</div>';
  }

  renderContent(`
    <div class="narrative fade-in">
      <h2>Day, Week ${state.week}</h2>

      <p>The day stretches before you like the ocean itself. There is always work on the island, if you know where to look. And you have learned to look.</p>

      ${state.population.length === 0 ? '<p class="scene-text">You are alone. The lighthouse and the sea and the work. There is a simplicity to it, but also an ache. The light is meant to bring people home. Without anyone to come home to, it is just a machine turning.</p>' : `<p>${state.population.length} ${state.population.length === 1 ? 'person moves' : 'people move'} about the island, each finding their rhythm. ${state.population.length >= 4 ? 'It is beginning to feel less like survival and more like a community.' : 'A small group, but growing.'}</p>`}

      ${trustUnlockHTML}
      ${assignmentHTML}
      ${buildHTML}
      ${convoHTML}

      <div class="choices" style="margin-top:2rem;">
        <button class="choice-btn" onclick="runDusk()">
          The work is done. Evening approaches.
          <span class="choice-cost">Proceed to Dusk phase</span>
        </button>
      </div>
    </div>
  `);
}

function assignTask(name, task) {
  state.assignments[name] = task;
}

function buildStructure(key) {
  const b = BUILDINGS[key];
  if (state.materials < b.cost.materials) return;

  state.materials -= b.cost.materials;
  state[b.stateKey] = true;
  state.hope += 5;
  state.structuresBuilt++;
  addLog(`Built the ${b.name}. The island grows.`);
  state.choicesMade.push({ week: state.week, choice: 'built_' + key });

  // Builders gain trust from building
  state.population.filter(p => p.skill === 'builder').forEach(p => addTrust(p.name, 5));

  updateResources();

  // Building-specific flavor text
  const buildingFlavor = {
    garden: 'Rows of soil, sheltered by stone walls from the wind. Small green shoots pushing through dark earth, defiant against the salt air. Life, insisting on itself.',
    infirmary: 'Clean surfaces. Organized supplies. A place where the hurt can be tended with care instead of desperation. Not a hospital. Something better: a place that says we will take care of you.',
    seawall: 'Stone against water. A line drawn in rock that says: this far, no further. The ocean will test it. The ocean tests everything. But the wall will hold because it was built by people who need it to hold.',
    dock: 'Timber and rope and the careful engineering of welcome. A place where ships can rest, where passengers can step onto solid ground. The first thing the rescued touch when they arrive.',
    upgrade: 'The mechanism hums differently now. Smoother, stronger, as if the lighthouse itself is grateful for the attention. The gears mesh with precision, the light burns cleaner, the fuel lasts longer.',
    workshop: 'Tools hung on walls. A workbench scarred with use. The smell of sawdust and oil and possibility. Every great thing that gets built here will start in this room, with a person standing at this bench, thinking.',
    watchtower: 'From the highest point on the island, you can see further than you could before. The horizon expands. Ships appear sooner. Weather announces itself from a distance. Knowledge is protection.',
    chapel: 'No altar. No icons. Just a circle of stone benches, open to the sky, where the lighthouse beam sweeps overhead like a slow, warm hand. People come here when they need to sit with their thoughts. It is enough.',
    stormShelter: 'Deep in the cliff, reinforced with timber and stone, a space that says: the worst can come, and we will endure it. Not comfortable. Not pretty. But safe. Sometimes safe is beautiful.'
  };

  const flavor = buildingFlavor[key] || b.desc;

  renderContent(`
    <div class="narrative fade-in">
      <h2>Building: ${b.name}</h2>

      <p class="sound-text">The sound of hammer on stone. The creak of timber being fitted into place. The quiet satisfaction of work that matters.</p>

      <p>The work takes most of the day. ${state.population.some(p => p.skill === 'builder') ? `${state.population.find(p => p.skill === 'builder').name} takes the lead, directing the work with quiet expertise. ${state.workshopBuilt && key !== 'workshop' ? 'The workshop provides the tools they need.' : ''}` : 'Everyone contributes what they can, learning as they go.'}</p>

      <p class="scene-text">${flavor}</p>

      <p>There is something about building that changes a place from a location into a home. Each structure is a vote of confidence. A declaration that says: we are staying. This matters.</p>

      <div class="choices">
        <button class="choice-btn" onclick="runDusk()">
          The work is done. Evening approaches.
          <span class="choice-cost">Proceed to Dusk phase</span>
        </button>
      </div>
    </div>
  `);
}

function talkTo(name) {
  const person = state.population.find(p => p.name === name);
  if (!person) return;

  const result = getConversation(person);
  if (!result || result.trustGated) {
    if (result && result.trustGated) {
      renderContent(`
        <div class="narrative fade-in">
          <h2>${person.name}</h2>
          <p>${person.name} seems like they want to say something more, but they hold back. You sense there is a deeper conversation waiting, but the trust is not there yet.</p>
          <p class="text-dim">Trust: ${result.current}/${result.required} needed for deeper conversation. Spend time together, assign them meaningful work, or comfort them during difficult nights.</p>
          <div class="choices">
            <button class="choice-btn" onclick="runDay()">Return to the day's work</button>
          </div>
        </div>
      `);
    }
    return;
  }

  state.hope += 3;
  addTrust(person.name, 15);
  if (!state.talkedTo.includes(person.name)) state.talkedTo.push(person.name);
  updateResources();

  // Sound for conversations
  const convoSounds = [
    'The fire pops in the hearth. Someone shifts their weight on the stone bench.',
    'Wind rattles the windows of the keeper\'s quarters. Outside, the beam sweeps on.',
    'A mug of something warm is set down on the table between you. The ceramic clicks against stone.',
    'The lighthouse mechanism ticks overhead, a metronome for the conversation below.'
  ];
  const soundHTML = `<p class="sound-text">${convoSounds[Math.floor(Math.random() * convoSounds.length)]}</p>`;

  renderContent(`
    <div class="narrative fade-in">
      <h2>A Conversation with ${person.name}</h2>

      ${soundHTML}

      <p class="scene-text">${person.story}</p>

      <div class="dialogue">
        <span class="speaker">${person.name}:</span> "${result.text}"
      </div>

      <p class="text-dim" style="margin-top:0.5rem;font-family:'Inter',sans-serif;font-size:0.7rem;">Trust increased. (${getTrust(person.name)}/100)</p>

      <div class="choices">
        <button class="choice-btn" onclick="runDay()">
          Return to the day's work
          <span class="choice-cost">Back to Day phase</span>
        </button>
        <button class="choice-btn" onclick="runDusk()">
          Evening approaches
          <span class="choice-cost">Proceed to Dusk phase</span>
        </button>
      </div>
    </div>
  `);
}

function spendTimeWith(name) {
  const person = state.population.find(p => p.name === name);
  if (!person) return;

  addTrust(person.name, 10);
  state.hope += 1;
  updateResources();

  const activities = [
    `You and ${person.name} walk the perimeter of the island in silence. Not the silence of strangers, but the silence of people who have learned that not everything needs to be said. The waves keep time.`,
    `${person.name} helps you clean the lantern glass. You work together without speaking, hands finding a rhythm. When the glass is clear, you both stand back and watch the beam strengthen. "Better," ${person.name} says. Just that.`,
    `You share a meal with ${person.name}. Nothing fancy. Bread, dried fish, water that tastes of iron. But the sharing is the thing. The willingness to sit across from someone and eat together. That is how trust is built: one meal at a time.`,
    `${person.name} shows you something they have been working on. A small thing: a repaired tool, a sketch of the island, a collection of unusual stones. You listen. You look. You care. That is enough.`,
    `You find ${person.name} watching the storm from the gallery. You stand beside them. After a while, they begin talking about home. Not the home they came from, but the home they are building here. You listen until the storm passes.`,
    `You and ${person.name} work side by side repairing storm damage. The work is hard and honest and by the end of it your hands are raw and your backs are sore and you trust each other slightly more than you did before. That is how it works.`
  ];

  renderContent(`
    <div class="narrative fade-in">
      <h2>Time with ${person.name}</h2>

      <p class="sound-text">The steady rhythm of the lighthouse mechanism above. The comfortable silence of shared purpose below.</p>

      <p>${activities[Math.floor(Math.random() * activities.length)]}</p>

      <p class="text-dim" style="margin-top:0.5rem;font-family:'Inter',sans-serif;font-size:0.7rem;">Trust with ${person.name}: ${getTrust(person.name)}/100</p>

      <div class="choices">
        <button class="choice-btn" onclick="runDay()">
          Return to the day's work
          <span class="choice-cost">Back to Day phase</span>
        </button>
        <button class="choice-btn" onclick="runDusk()">
          Evening approaches
          <span class="choice-cost">Proceed to Dusk phase</span>
        </button>
      </div>
    </div>
  `);
}

function resolveTrustUnlock(choiceIndex) {
  const choice = state._currentTrustChoices[choiceIndex];
  if (choice.effect) choice.effect();
  state._pendingTrustUnlock = null;
  state._currentTrustChoices = null;
  updateResources();
  updateSidePanel();
  runDay();
}

// ====== DUSK PHASE ======
function runDusk() {
  setPhase('dusk');
  setFog(false);

  // Check for special events first
  for (const [key, event] of Object.entries(SPECIAL_EVENTS)) {
    if (event.condition()) {
      const result = event.trigger();
      showSpecialEvent(result);
      return;
    }
  }

  // Determine ship arrival
  const availableShips = SHIPS.filter(s => !state.shipsSeen.includes(s.id));

  // Weather affects ship arrival chances
  const shipChanceMod = WEATHER_TYPES[state.weather] ? WEATHER_TYPES[state.weather].shipChance : 1.0;
  const noShipChance = 0.2 / shipChanceMod;

  if (availableShips.length === 0 || (Math.random() < noShipChance && state.week > 3)) {
    // No ship this week
    renderContent(`
      <div class="narrative fade-in">
        <h2>Dusk, Week ${state.week}</h2>

        <p>The horizon is empty tonight. No sails, no lights, no shapes moving through the rain. Just the ocean, doing what the ocean does. Existing without apology.</p>

        <p class="scene-text">You climb to the lantern room and watch the beam sweep the water. It finds nothing, but it keeps sweeping. That is the point. The light does not search. It waits.</p>

        <div class="choices">
          <button class="choice-btn" onclick="runNight()">
            Night falls. Tend the light.
            <span class="choice-cost">Proceed to Night phase</span>
          </button>
        </div>
      </div>
    `);
    return;
  }

  // Pick a ship
  let ship;
  // Weighted selection: prioritize story-relevant ships at the right times
  if (state.week >= 4 && state.week <= 8 && !state.shipsSeen.includes('pirate_shadow') && Math.random() < 0.3) {
    ship = SHIPS.find(s => s.id === 'pirate_shadow');
  } else if (state.week >= 5 && !state.shipsSeen.includes('plague_ship') && Math.random() < 0.25) {
    ship = SHIPS.find(s => s.id === 'plague_ship');
  } else if (state.week >= 10 && !state.shipsSeen.includes('ghost_ship') && Math.random() < 0.3) {
    ship = SHIPS.find(s => s.id === 'ghost_ship');
  } else if (state.week >= 14 && !state.shipsSeen.includes('lighthouse_tender') && Math.random() < 0.4) {
    ship = SHIPS.find(s => s.id === 'lighthouse_tender');
  } else {
    ship = availableShips[Math.floor(Math.random() * availableShips.length)];
  }

  if (!ship) ship = availableShips[0];

  state.currentShip = ship;
  state.shipsSeen.push(ship.id);

  const fuelCost = state.dockBuilt ? Math.ceil(ship.fuelCost * 0.6) : ship.fuelCost;
  const canAfford = state.fuel >= fuelCost;

  // Pirate special handling
  if (ship.pirateShip && !state.specialEvents.pirateOffered) {
    state.specialEvents.pirateOffered = true;
  }

  let cargoPreview = [];
  if (ship.cargo.food > 0) cargoPreview.push(`~${ship.cargo.food} food`);
  if (ship.cargo.materials > 0) cargoPreview.push(`~${ship.cargo.materials} materials`);
  if (ship.cargo.fuel > 0) cargoPreview.push(`~${ship.cargo.fuel} fuel`);

  renderContent(`
    <div class="narrative fade-in">
      <h2>Dusk, Week ${state.week}</h2>

      <p class="sound-text">The distant sound of a ship's horn, low and mournful, cutting through the wind.</p>

      <p>The sun bleeds into the horizon, staining the clouds in shades of copper and bruise. And then you see it.</p>

      <div class="ship-arrival">
        <div class="ship-name">${ship.name}</div>
        <div class="ship-desc">${ship.desc}</div>
        <div class="ship-details">
          <div class="ship-detail-item">Flag: ${ship.flag}</div>
          <div class="ship-detail-item">Size: ${ship.size}</div>
          <div class="ship-detail-item">Condition: ${ship.condition}</div>
          ${ship.passengers.length > 0 ? `<div class="ship-detail-item">Souls aboard: ~${ship.passengers.length}</div>` : '<div class="ship-detail-item">No visible crew</div>'}
          ${cargoPreview.length > 0 ? `<div class="ship-detail-item">Cargo estimate: ${cargoPreview.join(', ')}</div>` : ''}
          ${state.watchtowerBuilt ? `<div class="ship-detail-item" style="color:${ship.risk > 0.5 ? 'var(--danger)' : ship.risk > 0.2 ? 'var(--amber-glow)' : 'var(--hope-green)'}">Risk Assessment: ${ship.risk > 0.5 ? 'HIGH' : ship.risk > 0.2 ? 'MODERATE' : 'LOW'} (${Math.round(ship.risk * 100)}%)</div>` : ''}
        </div>
      </div>

      <p>${ship.arrivalText}</p>

      ${ship.diseaseRisk ? '<p class="scene-text" style="border-color:var(--danger);">The yellow flag. Quarantine. Whatever is aboard that ship, it is not just cargo and passengers.</p>' : ''}
      ${ship.pirateShip ? '<p class="scene-text" style="border-color:var(--danger);">No honest ship runs dark. Whatever they want, it is not rescue.</p>' : ''}

      <div class="choices">
        <button class="choice-btn" ${!canAfford ? 'disabled' : ''} onclick="guideShipIn()">
          Guide them in. Light the way through the rocks.
          <span class="choice-cost">Costs ${fuelCost} fuel${!canAfford ? ' (NOT ENOUGH)' : ''}</span>
        </button>
        <button class="choice-btn" onclick="warnShipOff()">
          Signal a warning. Tell them the rocks are too dangerous, the harbor too small.
          <span class="choice-cost">They may find another route. They may not.</span>
        </button>
        <button class="choice-btn" onclick="doNothing()">
          Do nothing. The light sweeps. The choice is theirs.
          <span class="choice-cost">The beam continues its rotation. What happens, happens.</span>
        </button>
      </div>
    </div>
  `);
}

function showSpecialEvent(event) {
  let choicesHTML = '<div class="choices">';
  event.choices.forEach((choice, i) => {
    choicesHTML += `<button class="choice-btn" onclick="resolveSpecialEvent(${i})">
      ${choice.text}
    </button>`;
  });
  choicesHTML += '</div>';

  // Store choices for resolution
  state._currentEventChoices = event.choices;

  renderContent(`
    <div class="narrative fade-in">
      <h2>${event.title}</h2>
      ${event.text}
      ${choicesHTML}
    </div>
  `);
}

function resolveSpecialEvent(choiceIndex) {
  const choice = state._currentEventChoices[choiceIndex];
  if (choice.effect) choice.effect();
  updateResources();

  // Continue to either dusk ship phase or night
  if (state.phase === 'dusk') {
    // After special event at dusk, check for ships still
    runDuskPostEvent();
  } else {
    runNight();
  }
}

function runDuskPostEvent() {
  // After a special event, go to night
  renderContent(`
    <div class="narrative fade-in">
      <p class="scene-text">The evening settles around the island like a held breath. The event lingers in the air, in the way people look at each other, in the quality of the silence.</p>

      <div class="choices">
        <button class="choice-btn" onclick="runNight()">
          Night falls. Tend the light.
          <span class="choice-cost">Proceed to Night phase</span>
        </button>
      </div>
    </div>
  `);
}

function guideShipIn() {
  const ship = state.currentShip;
  if (!ship) return;

  const fuelCost = state.dockBuilt ? Math.ceil(ship.fuelCost * 0.6) : ship.fuelCost;
  state.fuel -= fuelCost;
  state.shipsSaved++;

  // Add cargo
  state.food += ship.cargo.food;
  state.materials += ship.cargo.materials;
  state.fuel += ship.cargo.fuel;

  // Add passengers
  ship.passengers.forEach(p => {
    p.dialogueIndex = 0;
    state.population.push(p);
    state.assignments[p.name] = 'rest';
    state.trust[p.name] = 10; // Start with some trust from being saved
  });

  state.shipsArrived.push(ship.id);
  state.livesSaved += ship.passengers.length;
  state.hope += 5;

  // Map piece
  if (ship.hasMapPiece) {
    state.mapPieces++;
  }

  // Disease risk
  let diseaseText = '';
  if (ship.diseaseRisk) {
    diseaseText = '<p class="scene-text" style="border-color:var(--danger);">The yellow flag was not a bluff. Whatever illness the ship carries, it is now on your island. The question is not whether it will spread, but how far.</p>';
  }

  // Pirate special dialogue
  let pirateText = '';
  if (ship.pirateShip) {
    pirateText = `<p>Renna Blackwood steps onto the dock like she owns it. She does not. But she moves as if the concept of ownership is a suggestion she has chosen to decline.</p>
    <p class="dialogue"><span class="speaker">Renna:</span> "Interesting choice, keeper. Most would have let us crash. You guided pirates to your harbor. Either you are brave, or you are playing a longer game than I expected."</p>`;
  }

  let passengerText = '';
  if (ship.passengers.length > 0) {
    const names = ship.passengers.map(p => `<strong>${p.name}</strong> (${p.skill})`).join(', ');
    passengerText = `<p>The following souls step ashore: ${names}.</p>`;
  } else {
    passengerText = '<p>No passengers. Just cargo, stacked with care by hands now gone.</p>';
  }

  addLog(`Guided ${ship.name} safely through the rocks. ${ship.passengers.length} survivors joined the island.`);
  updateResources();

  renderContent(`
    <div class="narrative fade-in">
      <h2>Safe Harbor</h2>

      <p class="sound-text">The groan of timber against current. Ropes snapping taut. A hull sliding between rocks with inches to spare.</p>

      <p>You angle the beam, holding it steady on the channel between the rocks. The ship follows, her captain reading the light the way a musician reads a score. One wrong note and the rocks will have her.</p>

      <p>She makes it. The hull clears the final outcrop by a margin that would embarrass a surgeon. Ropes are thrown, made fast. The ship settles against the rocks like a tired animal finding rest.</p>

      ${pirateText}
      ${passengerText}
      ${diseaseText}

      <p class="scene-text">The light brought them home. That is what it does. That is what you do.</p>

      <div class="choices">
        <button class="choice-btn" onclick="runNight()">
          Night deepens. Tend the light.
          <span class="choice-cost">Proceed to Night phase</span>
        </button>
      </div>
    </div>
  `);
}

function warnShipOff() {
  const ship = state.currentShip;
  if (!ship) return;

  state.shipsWarned++;
  state.hope -= 3;

  const warnTexts = [
    `The ${ship.name} sees your warning signal and turns. She fights the current, heeling hard to starboard, and slowly, painfully, claws her way back to open water. You watch until she disappears into the storm. Whether she finds shelter elsewhere, you will never know.`,
    `Your warning light flashes across the water. The ${ship.name} hesitates, her sails luffing, then comes about. She will have to find another harbor. You hope there is one.`,
    `The ${ship.name} acknowledges your signal. A single lantern raised, then lowered. Understanding. Acceptance. She turns and the storm swallows her whole.`,
  ];

  addLog(`Warned off ${ship.name}. She turned back to open water.`);
  updateResources();

  renderContent(`
    <div class="narrative fade-in">
      <h2>Warning</h2>

      <p>${warnTexts[Math.floor(Math.random() * warnTexts.length)]}</p>

      <p class="scene-text">Not every ship can be saved. Not every harbor can hold every vessel. You tell yourself this. It helps. Mostly.</p>

      <div class="choices">
        <button class="choice-btn" onclick="runNight()">
          Night falls. Tend the light.
          <span class="choice-cost">Proceed to Night phase</span>
        </button>
      </div>
    </div>
  `);
}

function doNothing() {
  const ship = state.currentShip;
  if (!ship) return;

  state.shipsIgnored++;

  // Chance of wreck
  const wreckChance = 0.4 + (ship.risk * 0.3);
  const wrecked = Math.random() < wreckChance;

  if (wrecked) {
    state.wrecks++;
    state.hope -= 8;
    state.materials += Math.floor(ship.cargo.materials * 0.3);

    // Some passengers might survive
    const survivors = ship.passengers.filter(() => Math.random() < 0.3);
    survivors.forEach(p => {
      p.dialogueIndex = 0;
      p.mood = 'traumatized';
      state.population.push(p);
      state.assignments[p.name] = 'rest';
    });

    const deaths = ship.passengers.length - survivors.length;
    state.deaths += deaths;

    addLog(`${ship.name} struck the rocks. ${deaths > 0 ? `${deaths} souls lost.` : 'Miraculously, all survived.'} The wreckage washes ashore.`);

    renderContent(`
      <div class="narrative fade-in">
        <h2>The Rocks</h2>

        <p>You do nothing. The beam sweeps past the ${ship.name} without pausing, without guiding, without warning. And the rocks do what rocks do.</p>

        <p class="sound-text">The shriek of wood against stone. The crack of a hull splitting open. Water pouring into a wound that will not close.</p>

        <p>The sound is terrible. Wood against stone, the shriek of a hull being opened by something harder and older than itself. Then the sea, pouring into the wound. The ship lists, settles, breaks.</p>

        ${deaths > 0 ? `<p class="scene-text" style="border-color:var(--danger);">${deaths} ${deaths === 1 ? 'soul' : 'souls'} lost to the rocks. The ocean does not keep score, but you do.</p>` : ''}

        ${survivors.length > 0 ? `<p>${survivors.map(s => s.name).join(' and ')} ${survivors.length === 1 ? 'washes' : 'wash'} ashore on the wreckage. Alive, barely. They look at you and the lighthouse. They do not ask why.</p>` : ''}

        <p>Wreckage and debris scatter across the rocks. Some of it is useful. None of it was worth this.</p>

        <div class="choices">
          <button class="choice-btn" onclick="runNight()">
            Night falls. Tend the light.
            <span class="choice-cost">Proceed to Night phase</span>
          </button>
        </div>
      </div>
    `);
  } else {
    state.hope -= 2;
    addLog(`${ship.name} passed through without guidance. She made it, somehow.`);

    renderContent(`
      <div class="narrative fade-in">
        <h2>Passing</h2>

        <p>The ${ship.name} fights her own battle with the rocks. The beam sweeps past her like an indifferent eye. For a long moment, you think you hear the scrape of hull on stone, but it is just the wind. Just the wind.</p>

        <p>She clears the reef. By luck, by skill, by whatever combination of both keeps ships from becoming wreckage. You watch her lights recede into the storm until they are gone.</p>

        <p class="scene-text">She made it without you. That should be a relief. It is not, entirely.</p>

        <div class="choices">
          <button class="choice-btn" onclick="runNight()">
            Night falls. Tend the light.
            <span class="choice-cost">Proceed to Night phase</span>
          </button>
        </div>
      </div>
    `);
  }

  updateResources();
}

// ====== NIGHT PHASE ======
function runNight() {
  setPhase('night');

  // Apply weather visuals
  applyWeatherVisuals(state.weather);
  const w = WEATHER_TYPES[state.weather];

  // ---- RESOURCE CONSUMPTION ----

  // Fuel consumption (modified by weather)
  let baseFuel = state.lighthouseUpgraded ? 5 : 8;
  if (state.specialEvents.builderReinforce) baseFuel = Math.max(3, baseFuel - 2);
  let fuelDrain = Math.ceil(baseFuel * w.fuelMod);
  state.fuel -= fuelDrain;

  // Storm damage
  if (w.stormDamage > 0) {
    let damage = w.stormDamage;
    if (state.stormShelterBuilt) damage *= 0.5;
    if (state.wallBuilt) damage *= 0.7;
    const materialDamage = Math.floor(state.materials * damage);
    if (materialDamage > 0) {
      state.materials -= materialDamage;
    }
  }

  // Food consumption (1 per person + you)
  let foodDrain = 1 + state.population.length;
  // Garden reduces food drain
  if (state.gardenBuilt) foodDrain = Math.max(1, foodDrain - 3);
  state.food -= foodDrain;

  // ---- TASK YIELDS ----
  let taskReport = '';
  const fishers = state.population.filter(p => state.assignments[p.name] === 'fishing');
  const builders = state.population.filter(p => state.assignments[p.name] === 'building');
  const tenders = state.population.filter(p => state.assignments[p.name] === 'tending lighthouse');
  const scouts = state.population.filter(p => state.assignments[p.name] === 'scouting shore');
  const farmers = state.population.filter(p => state.assignments[p.name] === 'farming');

  if (fishers.length > 0) {
    let fishYield = fishers.length * (fishers.some(p => p.skill === 'fisher') ? 5 : 3);
    fishYield = Math.ceil(fishYield * w.fishMod);
    if (fishYield > 0) {
      state.food += fishYield;
      taskReport += `<p>The fishing crew brings in ${fishYield} units of food. ${fishers[0].name} leads the effort.${w.fishMod < 0.5 ? ' The rough seas made the work dangerous.' : w.fishMod > 1.2 ? ' The calm water made for excellent fishing.' : ''}</p>`;
    } else {
      taskReport += `<p>The fishing crew returns empty-handed. ${w.name} conditions made the waters too dangerous to fish.</p>`;
    }
  }

  if (builders.length > 0) {
    let buildYield = builders.length * (builders.some(p => p.skill === 'builder') ? 4 : 2);
    if (state.workshopBuilt) buildYield = Math.ceil(buildYield * 1.5);
    state.materials += buildYield;
    taskReport += `<p>The builders gather and process ${buildYield} materials from the island and shore.${state.workshopBuilt ? ' The workshop\'s tools make the work faster.' : ''}</p>`;
  }

  if (tenders.length > 0) {
    const fuelSave = tenders.some(p => p.skill === 'navigator') ? 3 : 1;
    state.fuel += fuelSave;
    taskReport += `<p>${tenders[0].name} tends the lighthouse mechanism, conserving ${fuelSave} fuel through careful adjustments.</p>`;
  }

  if (scouts.length > 0) {
    const scoutFind = Math.random();
    if (scoutFind > 0.5) {
      const found = Math.floor(Math.random() * 6) + 2;
      state.materials += found;
      taskReport += `<p>${scouts[0].name} finds useful salvage on the shore: ${found} materials worth keeping.</p>`;
    } else if (scoutFind > 0.2) {
      const foodFound = Math.floor(Math.random() * 4) + 1;
      state.food += foodFound;
      taskReport += `<p>${scouts[0].name} finds edible shellfish along the rocks. ${foodFound} food added to stores.</p>`;
    } else {
      taskReport += `<p>${scouts[0].name} patrols the shore but finds nothing of note. The sea is keeping its treasures today.</p>`;
    }
  }

  if (farmers.length > 0 && state.gardenBuilt) {
    const farmYield = farmers.length * (farmers.some(p => p.skill === 'cook') ? 4 : 3);
    state.food += farmYield;
    taskReport += `<p>The garden produces ${farmYield} food under ${farmers[0].name}'s care.</p>`;
  } else if (farmers.length > 0 && !state.gardenBuilt) {
    taskReport += `<p>The farmers work bare soil, trying to coax something from the rock. Without a proper garden, the yield is minimal.</p>`;
    state.food += 1;
  }

  // Hope adjustments
  if (state.food <= 5) { state.hope -= 5; }
  if (state.fuel <= 10) { state.hope -= 3; }
  if (state.population.length === 0 && state.week > 5) { state.hope -= 4; }

  // People with the cook skill boost hope
  const cooks = state.population.filter(p => p.skill === 'cook');
  if (cooks.length > 0) { state.hope += 2; }

  // Healing light prevents illness
  if (state.specialEvents.healingLight) {
    state.hope += 1; // subtle ongoing benefit
  }

  // Chapel passive hope
  if (state.chapelBuilt) {
    state.hope += 1;
  }

  // All assigned people gain a small amount of trust
  state.population.forEach(p => {
    const task = state.assignments[p.name];
    if (task && task !== 'rest') {
      addTrust(p.name, 2);
    }
  });

  // Rest restores mood
  state.population.forEach(p => {
    if (state.assignments[p.name] === 'rest') {
      p.mood = 'rested';
    }
  });

  // Starvation check
  if (state.food <= 0) {
    state.food = 0;
    state.hope -= 10;
    // Someone might leave or die
    if (state.population.length > 0 && Math.random() < 0.3) {
      const leaver = state.population[state.population.length - 1];
      state.population.pop();
      delete state.assignments[leaver.name];
      addLog(`${leaver.name} could bear the hunger no longer and left on a piece of driftwood. You watched them disappear into the storm.`);
    }
  }

  // ---- NIGHT EVENT ----
  const nightEvent = NIGHT_EVENTS[Math.floor(Math.random() * NIGHT_EVENTS.length)];
  nightEvent.effect();

  // ---- Clamp and update ----
  updateResources();
  updateSidePanel();

  // Check for departure due to low hope
  let departureText = '';
  if (state.hope <= 20 && state.population.length > 2 && Math.random() < 0.3) {
    const leaver = state.population.find(p => p.mood !== 'rested' && p.mood !== 'joyful') || state.population[state.population.length - 1];
    state.population = state.population.filter(p => p !== leaver);
    delete state.assignments[leaver.name];
    departureText = `<p class="scene-text" style="border-color:var(--danger);">${leaver.name} is gone in the morning. No note, no goodbye. Just an empty bed and a missing piece of driftwood. Hope is fragile, and you let it drop too low.</p>`;
    addLog(`${leaver.name} left the island. Hope had fallen too far.`);
  }

  // Night sound descriptions
  const nightSounds = [
    'The crash of waves against the rocks below, each one a small apocalypse of water and stone.',
    'Wind howling through the beacon room, a sound that is part scream, part song, part warning.',
    'The steady tick-tick-tick of the lighthouse mechanism, faithful as a heartbeat, turning the beam.',
    'Rain on the windows, a thousand tiny fists knocking to be let in.',
    'The creak of the lighthouse structure flexing in the wind, the tower swaying like a tree in a gale.',
    'The distant sound of a ship\'s horn, low and mournful, carried on the wind from somewhere you cannot see.',
    'The fire crackling in the keeper\'s quarters, each pop a small defiance against the cold outside.'
  ];

  // Weather-specific storm text
  const weatherNight = {
    clear: 'A rare clear night. The stars are out, brilliant and close enough to touch, and the beam sweeps through air that is, for once, clean and still.',
    light_rain: 'A gentle rain falls, softening the world into whispers. The beam cuts through drizzle, casting long shadows on the mist.',
    heavy_rain: 'Darkness comes, and with it, the rain. The lighthouse beam cuts through sheets of water, sweeping the black ocean in its endless circuit.',
    gale: 'The wind arrives with authority, bending the rain sideways, shaking the lighthouse to its foundation. The beam fights through the gale, reaching.',
    tempest: 'Thunder splits the sky as the tempest descends. Lightning reveals the ocean in strobe-light flashes: mountains of water, valleys of darkness. The beam competes with the storm for the right to illuminate.',
    hurricane: 'The hurricane hits like a wall of water and sound. The lighthouse shakes. The beam flickers but holds, a thread of amber sanity in the howling dark. Everyone holds their breath and waits.'
  };

  // Storm damage report
  let stormDamageText = '';
  if (w.stormDamage > 0) {
    const effectiveDamage = w.stormDamage * (state.stormShelterBuilt ? 0.5 : 1) * (state.wallBuilt ? 0.7 : 1);
    if (effectiveDamage > 0.2) {
      stormDamageText = `<p class="text-danger">The ${w.name.toLowerCase()} damages the island infrastructure. ${state.stormShelterBuilt ? 'The storm shelter reduces the impact. ' : ''}${state.wallBuilt ? 'The sea wall absorbs some of the force.' : 'Without a sea wall, the full force hits.'}</p>`;
    } else if (effectiveDamage > 0.05) {
      stormDamageText = `<p class="text-amber">Minor storm damage. ${state.stormShelterBuilt || state.wallBuilt ? 'Your defenses mitigate the worst of it.' : 'Better defenses would help.'}</p>`;
    }
  }

  // Build the night narrative
  renderContent(`
    <div class="narrative fade-in">
      <h2>Night, Week ${state.week}</h2>

      <p class="sound-text">${nightSounds[Math.floor(Math.random() * nightSounds.length)]}</p>

      <p>${weatherNight[state.weather] || weatherNight.heavy_rain} Above, the mechanism turns. Below, the foundation hums. Between them, you.</p>

      ${taskReport}

      <p class="scene-text">${nightEvent.text}</p>

      ${stormDamageText}
      ${departureText}

      <p>Fuel consumed: <span class="text-amber">${fuelDrain}</span>. Food consumed: <span class="text-amber">${foodDrain}</span>. Weather: ${w.icon} ${w.name}. ${state.fuel <= 15 ? '<span class="text-danger">Fuel is dangerously low.</span>' : ''} ${state.food <= 10 ? '<span class="text-danger">Food is scarce.</span>' : ''}</p>

      <div class="choices">
        <button class="choice-btn" onclick="endWeek()">
          Dawn breaks. A new week begins.
          <span class="choice-cost">Week ${state.week + 1}</span>
        </button>
      </div>
    </div>
  `);
}

function endWeek() {
  state.week++;
  state.currentShip = null;

  // Check end conditions
  if (state.week > 20) {
    triggerEnding();
  } else if (state.fuel <= 0) {
    triggerEnding('dark');
  } else if (state.hope <= 0) {
    if (state.population.length === 0) {
      triggerEnding('alone');
    } else {
      // Everyone leaves
      state.population.forEach(p => {
        addLog(`${p.name} left the island. There was no hope left to hold them.`);
      });
      state.population = [];
      state.assignments = {};
      triggerEnding('alone');
    }
  } else {
    runDawn();
  }
}

// ====== ENDINGS ======
function triggerEnding(forcedEnding) {
  state.gameOver = true;
  stopRain();
  setFog(false);

  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('ending-screen').style.display = 'block';
  document.body.className = '';

  let ending;

  if (forcedEnding === 'dark') {
    ending = getEndingDark();
  } else if (forcedEnding === 'alone') {
    ending = getEndingAlone();
  } else if (state.specialEvents.mapFound && state.mapPieces >= 3) {
    ending = getEndingExplorer();
  } else if (state.hope > 50 && state.population.length >= 8) {
    ending = getEndingKeeper();
  } else if (state.hope > 50 && state.population.length >= 4) {
    ending = getEndingKeeperSmall();
  } else if (state.population.length === 0) {
    ending = getEndingAlone();
  } else {
    ending = getEndingDeparture();
  }

  state.ending = ending.id;

  // Calculate legacy score
  const legacyScore = calculateLegacyScore();

  // Generate epilogue cards
  const epilogues = generateEpilogues();
  let epilogueHTML = '';
  if (epilogues.length > 0) {
    epilogueHTML = '<h2 style="font-size:1.3rem;color:var(--amber-soft);margin:2rem 0 1rem;text-align:center;">Epilogues</h2>';
    epilogues.forEach(ep => {
      epilogueHTML += `<div class="epilogue-card"><h3>${ep.title}</h3><p>${ep.text}</p></div>`;
    });
  }

  // Build all-buildings list
  const allBuildings = [
    state.gardenBuilt && 'Garden',
    state.infirmaryBuilt && 'Infirmary',
    state.wallBuilt && 'Sea Wall',
    state.dockBuilt && 'Dock',
    state.lighthouseUpgraded && 'Lighthouse Upgrade',
    state.workshopBuilt && 'Workshop',
    state.watchtowerBuilt && 'Watchtower',
    state.chapelBuilt && 'Chapel',
    state.stormShelterBuilt && 'Storm Shelter'
  ].filter(Boolean);

  document.getElementById('ending-content').innerHTML = `
    <h1>${ending.title}</h1>
    <div class="ending-subtitle">${ending.subtitle}</div>
    <div class="ending-text">${ending.text}</div>

    ${epilogueHTML}

    <div class="legacy-score">
      <h3>Legacy Score</h3>
      <div class="score-value">${legacyScore.total}</div>
      <div class="score-title">${legacyScore.title}</div>
    </div>

    <div class="ending-stats">
      <div><strong>Weeks survived:</strong> ${Math.min(state.week, 20)}</div>
      <div><strong>Ships guided safely:</strong> ${state.shipsSaved}</div>
      <div><strong>Ships warned away:</strong> ${state.shipsWarned}</div>
      <div><strong>Wrecks on the rocks:</strong> ${state.wrecks}</div>
      <div><strong>Lives saved:</strong> ${state.livesSaved}</div>
      <div><strong>Lives lost:</strong> ${state.deaths}</div>
      <div><strong>Community size:</strong> ${state.population.length}</div>
      <div><strong>Structures built:</strong> ${state.structuresBuilt} (${allBuildings.join(', ') || 'None'})</div>
      <div><strong>Journal entries found:</strong> ${state.journalFound.length} of ${JOURNAL_ENTRIES.length}</div>
      <div><strong>People spoken to:</strong> ${state.talkedTo.length}</div>
      <div><strong>Final hope:</strong> ${state.hope}</div>
      ${state.specialEvents.blackTideTriggered ? `<div><strong>The Black Tide:</strong> ${state.specialEvents.blackTideAccepted ? 'Accepted (light extinguished)' : 'Refused (light held)'}</div>` : ''}
      ${state.specialEvents.navigatorVoyage ? '<div><strong>Navigator\'s Voyage:</strong> Sent to find the other lighthouse</div>' : ''}
      ${state.specialEvents.healingLight ? '<div><strong>Healing Light:</strong> Discovered</div>' : ''}
    </div>
    <button class="btn-restart" onclick="restart()">Begin Again</button>
    <div style="margin-top:2rem;font-size:0.85rem;color:var(--text-dim);font-style:italic;">
      "The light was on. That was enough."<br><br>
      A game by Wren Hephaestus
    </div>
  `;
}

function getEndingKeeper() {
  const blackTideRef = state.specialEvents.blackTideAccepted ?
    '<p>You carry the weight of one dark night. Three names carved into stone. The fuel you bought with silence. You do not pretend it was the right choice. You do not pretend it was wrong. You carry it the way the lighthouse carries the storms: as part of what it means to stand here.</p>' :
    state.specialEvents.blackTideRefused ?
    '<p>You remember the night the Black Tide came, and you said no. The cost was real. But the light held, and the people held, and the community that grew from that refusal became the foundation of everything that followed. Sometimes the most important thing you build is the word "no," spoken clearly, in a storm.</p>' : '';

  const signalRef = state.specialEvents.signalReceived ?
    '<p>And somewhere across the water, another light burns. Another keeper tends another mechanism, sweeps another beam across another stretch of troubled ocean. You are not alone. You never were. The light found the light, the way it always does.</p>' : '';

  return {
    id: 'keeper',
    title: 'The Keeper',
    subtitle: 'You stayed. That was the whole point.',
    text: `<p>Twenty weeks. The storms never stopped. The light never went out.</p>

    <p>You stand in the lantern room at dawn, the glass freshly cleaned, the mechanism turning with the patience of something that has outlived every keeper who ever tended it. Below you, the island is waking. Smoke from the cooking fire. Voices carrying on the wind. The sound of work being done, not because it was ordered, but because it matters.</p>

    <p>You look around at what has grown here: ${state.population.length} people, each one brought by the light, each one choosing to stay. ${state.population.map(p => p.name).join('. ')}. Names you did not know twenty weeks ago. Names that now mean home.</p>

    <p>The storms will continue. You understand that now, if you found the previous keeper's journal, if you spoke to the scholars and the navigators and the strange figure from the unnamed ship. The lighthouse draws the storms. The storms justify the lighthouse. A pharmakon, the old keeper wrote. The cure that is also the disease.</p>

    ${blackTideRef}

    <p>But here is what the old keeper did not write, because it took you to discover it: the lighthouse is not the light. The light is not the mechanism, or the fuel, or the beam sweeping the water. The light is the choice to stay. The light is ${state.population[0].name} ${state.population[0].skill === 'cook' ? 'cooking for everyone because food is a language' : state.population[0].skill === 'fisher' ? 'casting nets at dawn because the ocean provides if you show up' : state.population[0].skill === 'healer' ? 'making evening rounds because no one should suffer alone' : state.population[0].skill === 'builder' ? 'always finding something to fix because building is how they say I am here' : 'finding their purpose in the daily work of staying'}. The light is ${state.population.length > 1 ? state.population[1].name + ' ' + (state.population[1].skill === 'navigator' ? 'reading the stars because someone must remember the way' : 'tending the garden because growing things is an act of faith') : 'every small act of stubborn, daily care'}. The light is a community that chose each other in a storm and kept choosing.</p>

    ${signalRef}

    <p>You climb to the lantern room at dawn and clean the glass. The mechanism turns. The beam sweeps. Somewhere out there, a ship sees the light and turns toward shore. Someone is coming home. You will be ready.</p>

    <p>The light is on. That is enough. It was always enough. The staying was the whole point.</p>`
  };
}

function getEndingKeeperSmall() {
  const person = state.population[0];
  const trust = person ? getTrust(person.name) : 0;

  return {
    id: 'keeper_small',
    title: 'The Keeper',
    subtitle: 'Small lights burn the longest.',
    text: `<p>Twenty weeks. A small community, but real. ${state.population.length} ${state.population.length === 1 ? 'person' : 'people'} who found this island and decided, against all evidence, that it was worth staying for.</p>

    <p>There are lighthouses in stories that guide armadas, that split storms, that hold back the dark with beams as wide as rivers. Faro Light is not one of those lighthouses. It is a small light on a small rock in a large ocean, and its keeper is not a hero. Not a legend. Just a person who chose to stay.</p>

    <p>The storms did not stop. The lighthouse did not solve them. You did not fix anything, really. You just kept the light on, night after night, checked the fuel, cleaned the glass, climbed the stairs in the dark when the mechanism needed attention at 3 AM, and somehow, impossibly, that was enough.</p>

    <p>${person ? `${person.name} once said something you have not forgotten: ${person.dialogues ? '"' + person.dialogues[0] + '"' : '"This place feels like it matters."'}` : ''} ${trust >= 60 && person ? `Over the weeks, your trust with ${person.name} grew into something rare: the kind of bond that does not require words, only presence. The kind where silence is not empty but full.` : ''}</p>

    ${state.specialEvents.blackTideRefused ? '<p>You remember the night you refused the Black Tide. The night you chose the light over fuel, the community over survival. That decision cost you. But it also built something. Every person on this island knows: the light is not for sale. That knowledge is worth more than oil.</p>' : ''}

    <p>Small things. A clean lantern. A warm meal. A conversation at dusk when the beam starts to sweep and the world turns amber for a few minutes before the dark comes. The sound of the mechanism turning, reliable as a heartbeat. ${state.chapelBuilt ? 'The chapel, where people sit and are quiet and find whatever it is they need to find.' : ''} ${state.gardenBuilt ? 'The garden, where green things grow in defiance of salt and wind.' : ''} These are not dramatic things. They are not the stuff of legends. But they are the stuff of staying, and staying is its own kind of courage.</p>

    <p>The world does not need grand gestures. It needs someone to tend the light. It needs someone to show up, every day, and do the work that keeps the dark at bay. Not the dramatic dark. The ordinary dark. The kind that comes when nobody bothers to keep the flame lit.</p>

    <p>The light is on. The door is open. The harbor, small as it is, has room for one more. It always has room for one more.</p>`
  };
}

function getEndingExplorer() {
  const scholars = state.population.filter(p => p.skill === 'scholar');
  const navigators = state.population.filter(p => p.skill === 'navigator');

  return {
    id: 'explorer',
    title: 'The Explorer',
    subtitle: 'You went deeper. Now you have to decide.',
    text: `<p>The map, assembled from fragments brought by scholars and strange ships and the restless ocean itself, reveals what you suspected: the lighthouse sits on something ancient. Something that was here before the ocean, before the island, before the storms.</p>

    <p>${scholars.length > 0 ? scholars[0].name + ' spreads the final chart across the table.' : 'The final chart takes shape.'} The data is undeniable. Core samples. Sonar readings. The Fibonacci patterns in the foundation stone. The underwater structure that mirrors the tower above. All of it points to a single, staggering conclusion: Faro Light is not a lighthouse that happens to sit on a strange rock. It is the visible fraction of something much, much larger. An anchor point in the fabric of whatever this place is. Older than the ocean. Older than the stone. Perhaps older than the concept of "old" itself.</p>

    <p>The underwater structure mirrors the lighthouse above. A beacon pointing down into a darkness that is not empty. The storms are drawn to the light, and the light is drawn to whatever sleeps below. A circuit. A relationship. A conversation between above and below that has been happening since before anyone was listening.</p>

    ${navigators.length > 0 ? `<p>${navigators[0].name} traces the storm spiral on the chart. "It is beautiful," they say quietly. "If you stop thinking of it as weather and start thinking of it as architecture, it is beautiful. The storms are not destruction. They are structure. The lighthouse is not fighting them. It is conducting them."</p>` : ''}

    <p>You could end it. The scholars believe that destroying the foundation stone would collapse the circuit. The storms would stop. The seas would calm. Ships would no longer need the lighthouse, because there would be nothing to navigate around. No storms to shelter from. No rocks hidden by impossible weather. Just ordinary ocean, and ordinary sky, and the ordinary silence of a world that no longer hums.</p>

    <p>But you would also end the light. And the community that gathered around it. And the harbor, and the garden, and the conversations at dusk when the beam starts to sweep. You would end the reason ${state.population[0].name} found this place, and ${state.population.length > 1 ? state.population[1].name : 'every soul who followed'}. You would end the thing that brought all of you together.</p>

    <p>You stand in the lantern room, the map spread before you, the mechanism turning overhead like the heartbeat of something vast and patient. ${state.population.length} faces look up at you from the island below, each one a life the light drew home. And you make a choice that is not really a choice at all.</p>

    <p>You fold the map. You put it in a drawer. You close the drawer.</p>

    <p>The storms can stay. The light can stay. The people, the harbor, the garden, the chapel, the dock, the sea wall, the workshop, every structure built by hands that chose to stay. They can all stay. The mystery can stay too, because some things are not meant to be solved. Some things are meant to be lived with. Tended. Kept.</p>

    <p>You are the keeper of Faro Light. You do not keep the mechanism, or the fuel, or the beam. You keep the choice. The choice to stay when leaving would be easier. The choice to tend when neglect would be simpler. The choice to light when darkness would be cheaper.</p>

    <p>The light was on. That was enough.</p>

    <p>The foundation stone hums beneath your feet, and for the first time, you hum back.</p>`
  };
}

function getEndingAlone() {
  const peopleWhoLeft = state.choicesMade.filter(c => c.choice === 'departure').map(c => c.person);
  const lostNames = state.log.filter(l => l.text.includes('left the island') || l.text.includes('was lost') || l.text.includes('did not survive')).map(l => l.text);

  return {
    id: 'alone',
    title: 'The Alone',
    subtitle: 'You kept the light burning. Just you.',
    text: `<p>In the end, it is just you and the lighthouse. The way it was in the beginning. The way, perhaps, it was always meant to be.</p>

    <p>You sit in the keeper's quarters as the wind tests the windows for the ten thousandth time. The chair has shaped itself to you over twenty weeks, the way a riverbed shapes itself to water. You fit here now. Not because you chose to, not because you are happy, but because staying has worn a groove in the world that matches your shape exactly.</p>

    ${state.deaths > 0 ? `<p>You remember the ones you lost. ${state.deaths} ${state.deaths === 1 ? 'life' : 'lives'}, each one a weight you carry up the spiral stairs every night. The light does not absolve you. It never did. But it does not condemn you either. It just burns, and you tend it, and the question of whether you did enough is one you will answer every night for as long as you are here.</p>` : ''}

    <p>The storms howl. The beam sweeps. The mechanism turns with the patience of something that has been turning since before you were born and will continue turning after you are gone. You clean the glass. You check the fuel. You climb the stairs and look out at the empty ocean and you tend the light.</p>

    <p>There is a word for this. Not loneliness, exactly. Not duty. Something between the two, in the place where stubbornness meets love. You tend the light because the light needs tending. Because somewhere out there, a ship you cannot see is navigating by a beam it does not understand, thrown by a keeper it will never meet.</p>

    <p>The foundation stone hums beneath your feet. You have stopped being afraid of it. Whatever lives below the lighthouse, whatever ancient structure mirrors the tower in the deep, it has been your companion through every storm. It hums, and you listen, and the conversation between you requires no words.</p>

    <p>That is enough. It has to be. Because the alternative is darkness, and you have chosen light, and you will keep choosing it until the fuel runs out or the storms stop or the ocean swallows the rocks themselves.</p>

    <p>You are the keeper. You keep. That is the whole of it. That is the entire story: someone stood in the dark and held a light, and did not let go.</p>

    <p>The light is on.</p>`
  };
}

function getEndingDark() {
  const hadPeople = state.population.length > 0;
  const hadBlackTide = state.specialEvents.blackTideAccepted;

  return {
    id: 'dark',
    title: 'The Dark',
    subtitle: 'The fuel is gone. The light goes out.',
    text: `<p>The moment arrives without ceremony. The flame gutters, dims, and dies. The mechanism continues to turn for a few seconds, gears spinning without purpose, before the counterweight runs down and it too falls silent. For the first time since anyone can remember, Faro Light is dark.</p>

    <p>The silence is enormous. You did not realize how much sound the lighthouse made until it stopped. The hum of the mechanism, the whisper of the flame, the creak of the rotating assembly. Gone. All gone. What remains is wind and water and your own breathing${hadPeople ? `, and the quiet, stunned faces of ${state.population.length} people who have just watched their anchor point go dark` : ''}.</p>

    ${hadPeople ? `<p>${state.population[0].name} is the first to speak. "What do we do?" The question hangs in the dark like a bell that has been struck. You do not have an answer. You have never not had the light. It was the one constant, the one thing you could point to and say: this is what we do. We tend the light. Without it, you are just people standing in a dark building on a rock in the ocean.</p>` : '<p>You sit alone in the dark lantern room, your hands on the cold mechanism, and feel the absence of purpose like a physical weight. Twenty weeks of tending, and this is how it ends. Not with a storm or a disaster, but with the simple arithmetic of consumption: you burned more than you gathered. The math caught up.</p>'}

    ${hadBlackTide ? '<p>You think about the fuel the Black Tide left on the dock. Thirty-five units. How long ago was that? How quickly it went. The devil\'s bargain bought you time, but time runs out too.</p>' : ''}

    <p>And then something strange: the storms begin to ease. The waves soften. The wind drops from a howl to a whisper to a breath. Without the light, without the beacon, the storms have nothing to spiral around. The pharmakon has been broken. The cure is gone, and so is the disease.</p>

    <p>But so is the light. And in the darkness, you hear the sound you feared most: a ship, somewhere in the black water, her hull finding the rocks without a beacon to warn her away. The crunch of wood on stone. The terrible, familiar sound of a vessel dying.</p>

    <p>You grip the gallery railing so hard your knuckles whiten. There is nothing you can do. No light to swing, no beam to guide, no flame to say here, come here, you are safe here. The dark does what the dark does when the light is gone. It fills the space. It takes what it wants.</p>

    <p>The night passes. It is the longest night of your life, longer than any storm, longer than any grief, because it is the first night you have ever spent without purpose. A keeper without a light is just a person. A lighthouse without a flame is just a tower. A community without a beacon is just people standing in the same place.</p>

    <p>But dawn comes. Dawn always comes. And in the pale gray light of morning, you see what the darkness left behind: wreckage on the rocks, yes. But also driftwood. And among the driftwood, sealed in a waterproof drum, a supply of fuel. Enough to relight the flame. Enough to begin again.</p>

    <p>You carry it up the spiral stairs. Your arms shake. The drum is heavy with second chances. You pour the oil, you trim the wick, you strike the match.</p>

    <p>The light comes back on.</p>

    <p>It always comes back on. Because someone is always willing to carry the fuel up the stairs. That is the real mechanism. That is the real light. Not the flame, not the oil, not the gears. The willingness to begin again after the dark. The staying, even when the light goes out.</p>

    <p>Especially then.</p>`
  };
}

function getEndingDeparture() {
  const firstPerson = state.population.length > 0 ? state.population[0] : null;
  const highestTrust = state.population.reduce((best, p) => {
    const t = getTrust(p.name);
    return t > (best ? getTrust(best.name) : 0) ? p : best;
  }, null);
  const successor = highestTrust || firstPerson;

  return {
    id: 'departure',
    title: 'The Departure',
    subtitle: 'You pass the light to other hands.',
    text: `<p>Twenty weeks. The storms, the ships, the faces in firelight. The smell of salt and whale oil and whatever it is that ${firstPerson ? firstPerson.name + ' is cooking tonight' : 'the island smells like after rain'}. You have given this place everything you have. Now it is time to pass it on.</p>

    <p>The decision does not come dramatically. There is no crisis, no final confrontation. You wake one morning and realize, with the quiet certainty of someone who has been carrying a weight for a long time, that you can set it down. Not because you are tired of it, but because other hands are ready.</p>

    ${successor ? `<p>You choose ${successor.name} as the next keeper. Not because they are the most qualified${successor.skill === 'navigator' ? ', though their understanding of the light and the storms runs deep' : successor.skill === 'builder' ? ', though they understand every bolt and beam of this tower' : ''}, but because they understand. They know what the light means. They know what it costs. And they are willing to pay it. You have watched them over these weeks, the way they look at the lighthouse, the way they tend the small things without being asked. They are ready.</p>

    <p>"You are sure?" they ask, standing in the lantern room where you have spent so many nights. The mechanism turns above you, casting amber shadows on both your faces. The room smells of oil and salt and the particular warmth that comes from a fire that has been burning for a very long time.</p>

    <p>"The light needs a keeper," you say. "It does not need to be me."</p>

    <p>"Will you come back?"</p>

    <p>You do not answer. Some questions are not meant to be answered. They are meant to be lived with, the way the lighthouse lives with the storms, the way the storms live with the light. But ${successor.name} sees something in your face, and they nod. "The light will be on when you do," they say. Not "if." "When." That is how keepers talk. In certainties, not possibilities.</p>

    <p>You walk through the community you helped build one last time. ${state.gardenBuilt ? 'Past the garden, where green things push through salt earth because someone believed they would.' : ''} ${state.chapelBuilt ? 'Past the chapel, where the stone benches hold the shape of everyone who has sat and been still.' : ''} ${state.dockBuilt ? 'Past the dock you built, where the next ship will find safe harbor.' : ''} Each structure a memory. Each path a story.</p>` : '<p>You leave the lighthouse running. The mechanism is wound, the fuel will last a few more days. Someone will come. Someone always comes. The light draws them. You know this because the light drew you, once, and you stayed for twenty weeks, and now you are leaving, and you are not the same person who arrived on a Tuesday with a bag and a government posting and no idea what any of it meant.</p>'}

    <p>The boat takes you away from Faro Light on a morning that is, for once, almost calm. You watch the lighthouse shrink on the horizon, the beam still visible even in daylight, a stubborn golden thread against the gray sky. ${state.shipsSaved > 5 ? `You have guided ${state.shipsSaved} ships through the rocks. You have given the light to ${state.livesSaved} souls who needed it.` : ''} The island does not get smaller. It stays exactly the same size. You are the one getting further away.</p>

    <p>The light is on. You made sure of that. Whatever comes next, whoever tends the mechanism, whoever cleans the glass and counts the fuel and watches the horizon for ships, whoever sits in the keeper's quarters at 3 AM listening to the storm and choosing, again, to stay: the light is on.</p>

    <p>That was enough. That was always enough.</p>`
  };
}

function calculateLegacyScore() {
  let total = 0;

  // Weeks survived (max 20 points)
  total += Math.min(state.week, 20);

  // Ships guided (5 each, max 50)
  total += Math.min(state.shipsSaved * 5, 50);

  // Lives saved (3 each)
  total += state.livesSaved * 3;

  // Lives lost (-5 each)
  total -= state.deaths * 5;

  // Structures built (4 each)
  total += state.structuresBuilt * 4;

  // Journal entries (3 each)
  total += state.journalFound.length * 3;

  // Community size (2 each)
  total += state.population.length * 2;

  // Hope bonus
  total += Math.floor(state.hope / 10);

  // Wrecks penalty
  total -= state.wrecks * 8;

  // Special events bonuses
  if (state.specialEvents.signalReceived) total += 10;
  if (state.specialEvents.mapFound) total += 15;
  if (state.specialEvents.healingLight) total += 10;
  if (state.specialEvents.navigatorVoyage) total += 10;
  if (state.specialEvents.blackTideRefused) total += 15;
  if (state.specialEvents.blackTideAccepted) total -= 10;

  // People talked to
  total += state.talkedTo.length * 2;

  total = Math.max(0, total);

  let title = '';
  if (total >= 150) title = 'The Eternal Keeper';
  else if (total >= 120) title = 'The Beacon of Hope';
  else if (total >= 90) title = 'The Faithful Keeper';
  else if (total >= 60) title = 'The Steadfast Light';
  else if (total >= 30) title = 'The Struggling Flame';
  else title = 'The Flickering Candle';

  return { total, title };
}

function generateEpilogues() {
  const epilogues = [];

  // Epilogue for specific islanders
  if (state.population.length > 0) {
    const person = state.population[0];
    const trust = getTrust(person.name);
    if (person.skill === 'fisher' && trust >= 30) {
      epilogues.push({
        title: person.name,
        text: `${person.name} continued to fish the waters around the lighthouse, learning the currents and the tides the way a musician learns an instrument: by feel, by repetition, by love. The fish still gathered in the beam's sweep, silver bodies spiraling in amber light, and ${person.name} never stopped being grateful for the strangeness of it. Years later, teaching a new arrival to cast a net, they would say: "The ocean provides, but only if you show up. Every day. In every weather. That is the secret. There is no secret. You just show up."`
      });
    } else if (person.skill === 'healer' && trust >= 30) {
      epilogues.push({
        title: person.name,
        text: `${person.name} established what would become the island's most important tradition: evening rounds. Every night before the light was lit, they walked from shelter to shelter, checking on every person, not just for illness but for the quieter ailments that have no name. Loneliness. Fear. The slow erosion of hope. They treated these the way they treated everything: with attention, with steadiness, with the conviction that no one should suffer alone. The infirmary became a place people went not just when they were hurt, but when they needed to remember that someone cared whether they lived or died.`
      });
    } else if (person.skill === 'builder') {
      epilogues.push({
        title: person.name,
        text: `${person.name} never stopped building. Long after the essential structures were complete, they found new projects: a bench with a view of the sunrise, a shelf carved into the lighthouse wall for the growing collection of messages in bottles, a stone path between the shelters that stayed dry even in the worst storms. They built the way other people breathe: constantly, unconsciously, as if the act of making something solid was the only way they knew how to say "I am here and I intend to stay."`
      });
    } else {
      epilogues.push({
        title: person.name,
        text: `${person.name} found something on the island they had not expected: purpose. Not the dramatic kind that announces itself with trumpets and ceremony, but the quiet kind that comes from doing the same necessary things every day and knowing they matter. When new arrivals asked why ${person.name} stayed, the answer was always the same: "Because the light needs people. And people need the light. It is not complicated. It just is."`
      });
    }
  }

  // Black Tide epilogue
  if (state.specialEvents.blackTideAccepted) {
    const marchetti = state.population.find(p => p.name === 'Elise Marchetti');
    epilogues.push({
      title: 'The Price of Fuel',
      text: `The night you turned off the light became the island's founding wound. Not a scar that healed, but a fracture that the community built itself around, the way a tree grows around a fence post: incorporating it, but never forgetting it was there. ${marchetti ? 'Elise Marchetti never spoke of it directly. She did not need to. Everyone who lived on the island knew the story of the dark night, and everyone understood that the fuel in the stores had been paid for in a currency more expensive than oil.' : 'The wreckage of the merchant vessel remained visible at low tide for years, a monument to a choice that no one could undo and no one could forget.'} Three names were carved into the chapel wall. Nikos. Fatima. Samuel. The light never went out again.`
    });
  } else if (state.specialEvents.blackTideRefused) {
    epilogues.push({
      title: 'The Night They Stood',
      text: `The night the Black Tide came became the island's founding story. Not the arrival, not the threat, but the refusal. The moment the keeper looked at Captain Salt's offer of fuel and plenty, looked at the people standing behind them in the amber light, and said no. The light stayed on. The pirates attacked. The cost was real. But so was the choice, and so was the community that grew from it. Years later, when the storms were bad and the fuel was low and someone suggested compromise, someone else would always say: "We stood once. We can stand again." And they did.`
    });
  }

  // Navigator voyage epilogue
  if (state.specialEvents.navigatorVoyage) {
    const voyageChoice = state.choicesMade.find(c => c.choice === 'navigator_voyage_yes');
    if (voyageChoice) {
      epilogues.push({
        title: 'The Voyage',
        text: `${voyageChoice.person} sailed into the storm wall on a clear morning, the only clear morning anyone could remember. They carried a sealed message from the keeper, a compass that pointed true, and the faith of everyone who watched from the cliff until the sail disappeared. For seven weeks, nothing. Then, on a night no different from any other, the distant lighthouse answered with a new pattern: three long, three short, three long. The maritime signal for "message received." ${voyageChoice.person} had made it. Whether they returned, whether the two lighthouses ever established regular contact, whether the voyage changed anything about the storms: these are questions for another story. This story only needs to know that someone was brave enough to try.`
      });
    }
  }

  // Limit to 3 epilogues
  return epilogues.slice(0, 3);
}

function restart() {
  document.getElementById('ending-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
  document.body.className = '';
}

// ====== KEYBOARD SHORTCUTS ======
document.addEventListener('keydown', (e) => {
  if (e.key === 'j' || e.key === 'J') {
    showJournal();
  }
  if (e.key === 'i' || e.key === 'I') {
    togglePanel();
  }
  if (e.key === 'Escape') {
    closeJournal();
  }
});
