<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Lighthouse</title>
<style>
/* ============================================
   THE LIGHTHOUSE
   A game about staying.
   by Wren Hephaestus
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600&display=swap');

:root {
  /* Ocean palette */
  --deep-ocean: #0a1628;
  --ocean-mid: #132744;
  --ocean-surface: #1a3a5c;
  --storm-gray: #3d4f5f;
  --storm-light: #6b818f;
  --cloud: #8fa4b2;

  /* Warm palette */
  --amber-glow: #f5a623;
  --amber-soft: #e8943a;
  --amber-deep: #c67a1c;
  --warm-white: #fef3e0;
  --hearth: #d4722a;

  /* UI */
  --text-primary: #e8e0d4;
  --text-secondary: #a8b4be;
  --text-dim: #6a7a88;
  --panel-bg: rgba(10, 22, 40, 0.92);
  --panel-border: rgba(245, 166, 35, 0.15);
  --danger: #c0392b;
  --hope-green: #27ae60;
  --fuel-amber: #f39c12;
  --food-blue: #3498db;
  --material-gray: #95a5a6;

  /* Phase colors */
  --dawn-sky: #2c1810;
  --dawn-horizon: #8b4513;
  --day-sky: #1a3a5c;
  --dusk-sky: #1a1025;
  --dusk-horizon: #6b2d5b;
  --night-sky: #050a15;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Crimson Text', Georgia, serif;
  background: var(--deep-ocean);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background-color 1.5s ease;
}

body.phase-dawn { background: linear-gradient(180deg, var(--dawn-sky) 0%, var(--dawn-horizon) 60%, var(--ocean-mid) 100%); }
body.phase-day { background: linear-gradient(180deg, var(--day-sky) 0%, var(--ocean-surface) 60%, var(--ocean-mid) 100%); }
body.phase-dusk { background: linear-gradient(180deg, var(--dusk-sky) 0%, var(--dusk-horizon) 60%, var(--ocean-mid) 100%); }
body.phase-night { background: linear-gradient(180deg, var(--night-sky) 0%, #0a0f1a 60%, var(--deep-ocean) 100%); }

/* ====== TITLE SCREEN ====== */
#title-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  text-align: center;
  background: linear-gradient(180deg, #050a15 0%, #0a1628 40%, #132744 100%);
  position: relative;
  overflow: hidden;
}

#title-screen::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(245, 166, 35, 0.08) 0%, transparent 60%);
  pointer-events: none;
}

.title-lighthouse {
  width: 120px;
  height: 300px;
  position: relative;
  margin-bottom: 2rem;
}

.title-lighthouse .tower {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 200px;
  background: linear-gradient(180deg, #2c2c2c 0%, #1a1a1a 100%);
  border-radius: 4px 4px 0 0;
  clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
}

.title-lighthouse .tower::before {
  content: '';
  position: absolute;
  top: 15px; left: 50%; transform: translateX(-50%);
  width: 8px; height: 8px;
  background: rgba(245, 166, 35, 0.3);
  border-radius: 50%;
}

.title-lighthouse .lantern {
  position: absolute;
  bottom: 200px;
  left: 50%;
  transform: translateX(-50%);
  width: 30px;
  height: 35px;
  background: linear-gradient(180deg, #333 0%, #222 100%);
  border-radius: 4px 4px 2px 2px;
  border: 1px solid #444;
}

.title-lighthouse .lantern::before {
  content: '';
  position: absolute;
  top: 5px; left: 50%; transform: translateX(-50%);
  width: 16px; height: 16px;
  background: var(--amber-glow);
  border-radius: 50%;
  box-shadow: 0 0 30px var(--amber-glow), 0 0 60px rgba(245, 166, 35, 0.5), 0 0 120px rgba(245, 166, 35, 0.2);
  animation: titleGlow 3s ease-in-out infinite;
}

.title-lighthouse .gallery {
  position: absolute;
  bottom: 235px;
  left: 50%;
  transform: translateX(-50%);
  width: 50px;
  height: 8px;
  background: #333;
  border-radius: 2px;
}

.title-lighthouse .cap {
  position: absolute;
  bottom: 243px;
  left: 50%;
  transform: translateX(-50%);
  width: 35px;
  height: 15px;
  background: #2a2a2a;
  border-radius: 50% 50% 0 0;
}

.title-lighthouse .base {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 20px;
  background: #1a1a1a;
  border-radius: 0 0 8px 8px;
}

.title-beam {
  position: absolute;
  bottom: 218px;
  left: 50%;
  width: 400px;
  height: 4px;
  transform-origin: left center;
  background: linear-gradient(90deg, rgba(245, 166, 35, 0.8) 0%, rgba(245, 166, 35, 0) 100%);
  animation: titleBeamSweep 8s ease-in-out infinite;
  filter: blur(2px);
}

.title-beam::after {
  content: '';
  position: absolute;
  top: -8px; left: 0;
  width: 100%; height: 20px;
  background: linear-gradient(90deg, rgba(245, 166, 35, 0.15) 0%, rgba(245, 166, 35, 0) 100%);
  filter: blur(6px);
}

@keyframes titleGlow {
  0%, 100% { box-shadow: 0 0 30px var(--amber-glow), 0 0 60px rgba(245, 166, 35, 0.5), 0 0 120px rgba(245, 166, 35, 0.2); }
  50% { box-shadow: 0 0 40px var(--amber-glow), 0 0 80px rgba(245, 166, 35, 0.6), 0 0 160px rgba(245, 166, 35, 0.3); }
}

@keyframes titleBeamSweep {
  0% { transform: rotate(-30deg); opacity: 0.6; }
  25% { opacity: 1; }
  50% { transform: rotate(30deg); opacity: 0.6; }
  75% { opacity: 1; }
  100% { transform: rotate(-30deg); opacity: 0.6; }
}

.title-text h1 {
  font-family: 'Crimson Text', Georgia, serif;
  font-size: 3.5rem;
  font-weight: 700;
  color: var(--warm-white);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
  text-shadow: 0 0 40px rgba(245, 166, 35, 0.3);
}

.title-text .subtitle {
  font-size: 1.1rem;
  font-style: italic;
  color: var(--text-secondary);
  margin-bottom: 3rem;
  letter-spacing: 0.05em;
}

.title-text .epigraph {
  max-width: 500px;
  font-size: 1rem;
  line-height: 1.7;
  color: var(--text-dim);
  font-style: italic;
  margin-bottom: 3rem;
  padding: 0 1rem;
}

.btn-start {
  font-family: 'Crimson Text', Georgia, serif;
  font-size: 1.2rem;
  padding: 0.8rem 3rem;
  background: transparent;
  border: 1px solid var(--amber-glow);
  color: var(--amber-glow);
  cursor: pointer;
  letter-spacing: 0.1em;
  transition: all 0.3s ease;
  text-transform: uppercase;
}

.btn-start:hover {
  background: rgba(245, 166, 35, 0.1);
  box-shadow: 0 0 30px rgba(245, 166, 35, 0.2);
}

.title-credit {
  position: absolute;
  bottom: 2rem;
  font-size: 0.85rem;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

/* ====== GAME SCREEN ====== */
#game-screen {
  display: none;
  min-height: 100vh;
}

/* Top bar */
.top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--panel-bg);
  border-bottom: 1px solid var(--panel-border);
  backdrop-filter: blur(10px);
  padding: 0.6rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.week-phase {
  display: flex;
  align-items: center;
  gap: 1rem;
  min-width: 200px;
}

.week-num {
  font-family: 'Inter', sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--amber-glow);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.phase-name {
  font-size: 0.85rem;
  font-style: italic;
  color: var(--text-secondary);
}

.resources {
  display: flex;
  gap: 1.2rem;
  flex-wrap: wrap;
  justify-content: center;
}

.resource {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.75rem;
}

.resource-icon {
  font-size: 0.9rem;
}

.resource-bar-container {
  width: 60px;
  height: 6px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
  overflow: hidden;
}

.resource-bar {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}

.resource-bar.fuel { background: var(--fuel-amber); }
.resource-bar.food { background: var(--food-blue); }
.resource-bar.materials { background: var(--material-gray); }
.resource-bar.hope { background: var(--hope-green); }

.resource-val {
  min-width: 24px;
  text-align: right;
  color: var(--text-secondary);
}

.top-buttons {
  display: flex;
  gap: 0.5rem;
}

.btn-icon {
  font-family: 'Inter', sans-serif;
  font-size: 0.7rem;
  padding: 0.3rem 0.6rem;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--text-secondary);
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.btn-icon:hover {
  background: rgba(255, 255, 255, 0.1);
  color: var(--text-primary);
}

/* Main content area */
.game-layout {
  display: flex;
  padding-top: 52px;
  min-height: 100vh;
}

.main-content {
  flex: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

/* Side panel */
.side-panel {
  width: 320px;
  background: var(--panel-bg);
  border-left: 1px solid var(--panel-border);
  padding: 1rem;
  overflow-y: auto;
  max-height: calc(100vh - 52px);
  position: fixed;
  top: 52px;
  right: 0;
  bottom: 0;
  transform: translateX(0);
  transition: transform 0.3s ease;
  z-index: 50;
  backdrop-filter: blur(10px);
}

.side-panel.hidden {
  transform: translateX(100%);
}

.side-panel h3 {
  font-size: 0.75rem;
  font-family: 'Inter', sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--amber-glow);
  margin-bottom: 0.8rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--panel-border);
}

.side-panel h3:not(:first-child) {
  margin-top: 1.5rem;
}

.panel-section {
  margin-bottom: 1rem;
}

.islander-card {
  padding: 0.5rem 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  font-size: 0.9rem;
}

.islander-card .name {
  color: var(--warm-white);
  font-weight: 600;
}

.islander-card .role {
  font-family: 'Inter', sans-serif;
  font-size: 0.7rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.islander-card .mood {
  font-size: 0.8rem;
  font-style: italic;
  color: var(--text-secondary);
}

.building-item {
  font-size: 0.85rem;
  padding: 0.3rem 0;
  color: var(--text-secondary);
}

.building-item .b-name {
  color: var(--warm-white);
}

.log-entry {
  font-size: 0.85rem;
  padding: 0.4rem 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.03);
  color: var(--text-secondary);
  line-height: 1.5;
}

.log-entry .log-week {
  font-family: 'Inter', sans-serif;
  font-size: 0.65rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Narrative content */
.narrative {
  margin-bottom: 2rem;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.narrative h2 {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--warm-white);
  margin-bottom: 1rem;
  letter-spacing: 0.02em;
}

.narrative p {
  font-size: 1.05rem;
  line-height: 1.85;
  margin-bottom: 1rem;
  color: var(--text-primary);
}

.narrative .scene-text {
  font-style: italic;
  color: var(--text-secondary);
  border-left: 2px solid var(--panel-border);
  padding-left: 1rem;
  margin: 1.5rem 0;
}

.narrative .dialogue {
  color: var(--warm-white);
  margin: 1rem 0;
  padding-left: 1rem;
}

.narrative .speaker {
  font-weight: 600;
  color: var(--amber-soft);
}

/* Choice buttons */
.choices {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
  margin-top: 1.5rem;
}

.choice-btn {
  font-family: 'Crimson Text', Georgia, serif;
  font-size: 1rem;
  padding: 1rem 1.2rem;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--text-primary);
  cursor: pointer;
  text-align: left;
  transition: all 0.3s ease;
  border-radius: 2px;
  line-height: 1.5;
}

.choice-btn:hover {
  background: rgba(245, 166, 35, 0.08);
  border-color: var(--amber-glow);
  color: var(--warm-white);
}

.choice-btn .choice-cost {
  font-family: 'Inter', sans-serif;
  font-size: 0.7rem;
  color: var(--text-dim);
  display: block;
  margin-top: 0.3rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.choice-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.choice-btn:disabled:hover {
  background: rgba(255, 255, 255, 0.03);
  border-color: rgba(255, 255, 255, 0.1);
  color: var(--text-primary);
}

/* Ship display */
.ship-arrival {
  background: rgba(245, 166, 35, 0.05);
  border: 1px solid var(--panel-border);
  padding: 1.2rem;
  margin: 1rem 0;
  border-radius: 2px;
}

.ship-name {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--amber-glow);
  margin-bottom: 0.3rem;
}

.ship-desc {
  font-size: 0.95rem;
  color: var(--text-secondary);
  font-style: italic;
  margin-bottom: 0.8rem;
}

.ship-details {
  font-family: 'Inter', sans-serif;
  font-size: 0.75rem;
  color: var(--text-dim);
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
}

.ship-detail-item {
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

/* Assignment UI */
.assignment-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
  margin: 1rem 0;
}

.assign-slot {
  padding: 0.6rem;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 2px;
  font-size: 0.9rem;
}

.assign-slot .slot-title {
  font-family: 'Inter', sans-serif;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  margin-bottom: 0.3rem;
}

.assign-slot select {
  width: 100%;
  font-family: 'Crimson Text', Georgia, serif;
  font-size: 0.9rem;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--text-primary);
  padding: 0.3rem;
  border-radius: 2px;
  cursor: pointer;
}

.assign-slot select option {
  background: var(--deep-ocean);
  color: var(--text-primary);
}

/* Lighthouse visual */
.lighthouse-scene {
  position: relative;
  height: 280px;
  margin: 1.5rem 0;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  overflow: hidden;
}

.lh-ocean {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  background: linear-gradient(180deg, rgba(19, 39, 68, 0.6) 0%, rgba(10, 22, 40, 0.8) 100%);
}

.lh-ocean::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.1) 30%, rgba(255, 255, 255, 0.15) 50%, rgba(255, 255, 255, 0.1) 70%, transparent 100%);
  animation: waveShimmer 4s ease-in-out infinite;
}

@keyframes waveShimmer {
  0%, 100% { transform: translateX(-20px); }
  50% { transform: translateX(20px); }
}

.lh-cliff {
  position: absolute;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  width: 160px;
  height: 40px;
  background: #1a1a1a;
  border-radius: 50% 50% 0 0;
}

.lh-tower {
  position: relative;
  z-index: 2;
  width: 28px;
  height: 150px;
  background: linear-gradient(90deg, #3a3a3a 0%, #4a4a4a 40%, #3a3a3a 100%);
  clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
  bottom: 85px;
}

.lh-tower .stripe {
  position: absolute;
  left: 0; right: 0;
  height: 20px;
  background: rgba(200, 50, 50, 0.7);
}

.lh-tower .stripe:nth-child(1) { top: 20px; }
.lh-tower .stripe:nth-child(2) { top: 60px; }
.lh-tower .stripe:nth-child(3) { top: 100px; }

.lh-lantern-room {
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateX(-50%);
  width: 22px;
  height: 25px;
  background: rgba(245, 166, 35, 0.2);
  border: 2px solid #555;
  border-radius: 3px;
  z-index: 3;
}

.lh-light {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 10px;
  height: 10px;
  background: var(--amber-glow);
  border-radius: 50%;
  box-shadow: 0 0 15px var(--amber-glow), 0 0 30px rgba(245, 166, 35, 0.5), 0 0 60px rgba(245, 166, 35, 0.2);
  animation: lightPulse 2s ease-in-out infinite;
}

.lh-light.off {
  background: #333;
  box-shadow: none;
  animation: none;
}

@keyframes lightPulse {
  0%, 100% { box-shadow: 0 0 15px var(--amber-glow), 0 0 30px rgba(245, 166, 35, 0.5), 0 0 60px rgba(245, 166, 35, 0.2); }
  50% { box-shadow: 0 0 20px var(--amber-glow), 0 0 40px rgba(245, 166, 35, 0.6), 0 0 80px rgba(245, 166, 35, 0.3); }
}

.lh-cap {
  position: absolute;
  top: -45px;
  left: 50%;
  transform: translateX(-50%);
  width: 28px;
  height: 15px;
  background: #333;
  border-radius: 50% 50% 0 0;
  z-index: 4;
}

.lh-gallery {
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 36px;
  height: 5px;
  background: #444;
  border-radius: 2px;
  z-index: 3;
}

.lh-beam {
  position: absolute;
  top: -18px;
  left: 50%;
  width: 500px;
  height: 3px;
  transform-origin: 0 50%;
  z-index: 1;
  animation: beamSweep 6s linear infinite;
}

.lh-beam::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 0;
  width: 100%;
  height: 5px;
  background: linear-gradient(90deg, rgba(245, 166, 35, 0.7) 0%, rgba(245, 166, 35, 0) 100%);
  filter: blur(1px);
}

.lh-beam::after {
  content: '';
  position: absolute;
  top: -10px;
  left: 0;
  width: 100%;
  height: 23px;
  background: linear-gradient(90deg, rgba(245, 166, 35, 0.12) 0%, rgba(245, 166, 35, 0) 100%);
  filter: blur(4px);
}

.lh-beam.off { display: none; }

@keyframes beamSweep {
  0% { transform: rotate(-50deg); }
  100% { transform: rotate(310deg); }
}

/* Weather effects */
.weather-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 10;
}

.rain {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow: hidden;
  opacity: 0;
  transition: opacity 1s;
}

.rain.active { opacity: 1; }

.raindrop {
  position: absolute;
  width: 1px;
  height: 15px;
  background: linear-gradient(180deg, transparent 0%, rgba(174, 194, 224, 0.3) 100%);
  animation: rainFall linear infinite;
}

@keyframes rainFall {
  0% { transform: translateY(-20px); }
  100% { transform: translateY(100vh); }
}

.lightning-flash {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255, 255, 255, 0.15);
  opacity: 0;
  pointer-events: none;
  z-index: 11;
}

.lightning-flash.flash {
  animation: lightningFlash 0.3s ease;
}

@keyframes lightningFlash {
  0% { opacity: 0; }
  10% { opacity: 1; }
  20% { opacity: 0; }
  30% { opacity: 0.7; }
  100% { opacity: 0; }
}

.fog-overlay {

<script>
// ============================================
// THE LIGHTHOUSE - Game Engine
// ============================================

// ====== GAME STATE ======
const state = {
  week: 1,
  phase: 'dawn', // dawn, day, dusk, night
  fuel: 50,
  food: 40,
  materials: 30,
  hope: 60,
  population: [],
  buildings: [],
  log: [],
  journalFound: [],
  shipsArrived: [],
  shipsSeen: [],
  specialEvents: {
    mapFound: false,
    signalReceived: false,
    pirateOffered: false,
    pirateAccepted: false,
    blackTideTriggered: false,
    blackTideAccepted: false,
    blackTideRefused: false,
    illnessStruck: false,
    illnessCured: false,
    stormOfStorms: false,
    healingLight: false,
    navigatorVoyage: false,
    builderReinforce: false,
    crashedMerchant: false
  },
  assignments: {},
  trust: {}, // name -> trust level (0-100)
  wrecks: 0,
  deaths: 0,
  shipsSaved: 0,
  shipsWarned: 0,
  shipsIgnored: 0,
  livesSaved: 0,
  structuresBuilt: 0,
  lighthouseUpgraded: false,
  gardenBuilt: false,
  infirmaryBuilt: false,
  wallBuilt: false,
  dockBuilt: false,
  workshopBuilt: false,
  watchtowerBuilt: false,
  chapelBuilt: false,
  stormShelterBuilt: false,
  currentShip: null,
  conversationTarget: null,
  gameOver: false,
  ending: null,
  mapPieces: 0,
  fuelReserve: 0,
  // Weather system
  weather: 'heavy_rain', // clear, light_rain, heavy_rain, gale, tempest, hurricane
  nextWeekWeather: null,
  weatherHistory: [],
  // Choice tracking for endings
  choicesMade: [],
  talkedTo: [],
  // Black Tide tracking
  blackTideSurvivors: []
};

// ====== WEATHER SYSTEM ======
const WEATHER_TYPES = {
  clear: {
    name: 'Clear Skies',
    icon: '☀️',
    desc: 'A rare break in the storms. The sky is impossibly wide.',
    fuelMod: 0.7,    // less fuel consumed
    fishMod: 1.5,     // better fishing
    shipChance: 1.3,  // more ships
    stormDamage: 0,
    rainIntensity: null,
    bodyClass: 'weather-clear'
  },
  light_rain: {
    name: 'Light Rain',
    icon: '🌦️',
    desc: 'A gentle rain, almost companionable. The kind that whispers rather than shouts.',
    fuelMod: 0.9,
    fishMod: 1.1,
    shipChance: 1.1,
    stormDamage: 0,
    rainIntensity: 'light',
    bodyClass: ''
  },
  heavy_rain: {
    name: 'Heavy Rain',
    icon: '🌧️',
    desc: 'The rain comes down in sheets, turning the world to water and noise.',
    fuelMod: 1.0,
    fishMod: 0.9,
    shipChance: 1.0,
    stormDamage: 0.05,
    rainIntensity: 'medium',
    bodyClass: ''
  },
  gale: {
    name: 'Gale',
    icon: '💨',
    desc: 'The wind tears at everything, finding every crack and seam. The lighthouse groans.',
    fuelMod: 1.3,
    fishMod: 0.5,
    shipChance: 0.8,
    stormDamage: 0.15,
    rainIntensity: 'heavy',
    bodyClass: 'weather-gale'
  },
  tempest: {
    name: 'Tempest',
    icon: '⛈️',
    desc: 'Thunder and lightning split the sky. The ocean rises to meet the storm halfway.',
    fuelMod: 1.5,
    fishMod: 0.3,
    shipChance: 0.6,
    stormDamage: 0.25,
    rainIntensity: 'heavy',
    bodyClass: 'weather-tempest'
  },
  hurricane: {
    name: 'Hurricane',
    icon: '🌀',
    desc: 'The world unmakes itself. Wind and water become the same thing. The lighthouse is the only thing that remembers which way is up.',
    fuelMod: 2.0,
    fishMod: 0.0,
    shipChance: 0.3,
    stormDamage: 0.4,
    rainIntensity: 'heavy',
    bodyClass: 'weather-hurricane'
  }
};

function generateWeather() {
  const weights = {
    clear: 5,
    light_rain: 15,
    heavy_rain: 30,
    gale: 25,
    tempest: 18,
    hurricane: 7
  };
  // Storms get worse over time
  if (state.week > 12) {
    weights.clear = 3;
    weights.hurricane = 12;
    weights.tempest = 22;
  }
  if (state.week > 16) {
    weights.clear = 1;
    weights.hurricane = 18;
  }
  const total = Object.values(weights).reduce((a, b) => a + b, 0);
  let roll = Math.random() * total;
  for (const [type, weight] of Object.entries(weights)) {
    roll -= weight;
    if (roll <= 0) return type;
  }
  return 'heavy_rain';
}

function applyWeatherVisuals(weatherType) {
  const w = WEATHER_TYPES[weatherType];
  // Remove old weather classes
  document.body.classList.remove('weather-clear', 'weather-gale', 'weather-tempest', 'weather-hurricane');
  if (w.bodyClass) document.body.classList.add(w.bodyClass);

  if (w.rainIntensity) {
    startRain(w.rainIntensity, weatherType);
  } else {
    stopRain();
  }

  if (weatherType === 'tempest' || weatherType === 'hurricane') {
    setTimeout(flashLightning, 1500);
    setTimeout(flashLightning, 3500);
    if (weatherType === 'hurricane') {
      setTimeout(flashLightning, 5500);
      setTimeout(flashLightning, 7000);
    }
  }

  setFog(weatherType === 'clear' ? false : Math.random() < 0.2);
}

function getWeatherDisplay() {
  const w = WEATHER_TYPES[state.weather];
  return `<span class="weather-icon">${w.icon}</span> ${w.name}`;
}

// ====== TRUST/RELATIONSHIP SYSTEM ======
function getTrust(name) {
  if (!name) return 0;
  return state.trust[name] || 0;
}

function addTrust(name, amount) {
  if (!name) return;
  if (!state.trust[name]) state.trust[name] = 0;
  state.trust[name] = clamp(state.trust[name] + amount, 0, 100);
}

function getConversation(person) {
  if (!person.dialogueIndex) person.dialogueIndex = 0;
  const trust = getTrust(person.name);
  // First dialogue always available
  // Second dialogue requires trust >= 30
  // Third dialogue requires trust >= 60
  if (person.dialogueIndex === 0) {
    person.dialogueIndex++;
    return { text: person.dialogues[0], trustGated: false };
  }
  if (person.dialogueIndex === 1) {
    if (trust < 30) return { text: null, trustGated: true, required: 30, current: trust };
    person.dialogueIndex++;
    return { text: person.dialogues[1], trustGated: false };
  }
  if (person.dialogueIndex === 2) {
    if (trust < 60) return { text: null, trustGated: true, required: 60, current: trust };
    person.dialogueIndex++;
    return { text: person.dialogues[2], trustGated: false };
  }
  return { text: null, trustGated: false };
}

// Check for trust-based special unlocks
function checkTrustUnlocks() {
  const unlocks = [];
  state.population.forEach(p => {
    const trust = getTrust(p.name);
    if (trust >= 80) {
      if (p.skill === 'navigator' && !state.specialEvents.navigatorVoyage) {
        unlocks.push({
          type: 'navigator_voyage',
          person: p,
          text: `${p.name} approaches you quietly after the others have gone to sleep. "I have been watching the storms. There is a pattern. A window. I think I can sail through to the other lighthouse." Their eyes are steady. "I need your permission, keeper. And maybe a little of your faith."`,
          choices: [
            {
              text: `"Go. Find the other lighthouse. Tell them we are here."`,
              effect: () => {
                state.specialEvents.navigatorVoyage = true;
                state.hope += 15;
                state.population = state.population.filter(pp => pp !== p);
                delete state.assignments[p.name];
                addLog(`${p.name} sailed into the storm to find the other lighthouse. An act of extraordinary courage.`);
                state.choicesMade.push({ week: state.week, choice: 'navigator_voyage_yes', person: p.name });
              }
            },
            {
              text: `"I cannot lose you to the storm. Stay. We need you here."`,
              effect: () => {
                state.specialEvents.navigatorVoyage = true;
                state.hope += 3;
                addTrust(p.name, 10);
                addLog(`${p.name} offered to sail to the other lighthouse. You asked them to stay.`);
                state.choicesMade.push({ week: state.week, choice: 'navigator_voyage_no', person: p.name });
              }
            }
          ]
        });
      }
      if (p.skill === 'healer' && !state.specialEvents.healingLight) {
        unlocks.push({
          type: 'healing_light',

          choices: [
            {
              text: `Help them build the healing reflector.`,
              effect: () => {
                state.specialEvents.healingLight = true;
                state.materials -= 5;
                state.hope += 10;
                addLog(`${p.name} discovered the lighthouse beam has healing properties. A reflector now protects the community.`);
                state.choicesMade.push({ week: state.week, choice: 'healing_light', person: p.name });
              }
            }
          ]
        });
      }
      if (p.skill === 'builder' && !state.specialEvents.builderReinforce) {
        unlocks.push({
          type: 'builder_reinforce',
          person: p,
          text: `${p.name} has been studying the lighthouse mechanism for weeks now, running their hands over the gears, listening to the rhythm of the rotation. Tonight they come to you with sketches.\n\n"The mechanism is overbuilt," they say. "Whoever designed it built in redundancies we are not using. I can reconfigure the gear train to reduce friction by forty percent. Less friction means less fuel. Less fuel means more nights with the light on."\n\nThey spread the drawings across the table. The math is clean, the engineering sound. "It will take a full day. The light will have to go dark while I work. But when it comes back, it will burn twice as long on the same fuel."`,
          choices: [
            {
              text: `"Do it. One dark day for many bright nights."`,
              effect: () => {
                state.specialEvents.builderReinforce = true;
                state.lighthouseUpgraded = true;
                state.hope += 8;
                addLog(`${p.name} reconfigured the lighthouse mechanism. Fuel consumption reduced permanently.`);
                state.choicesMade.push({ week: state.week, choice: 'builder_reinforce', person: p.name });
              }
            },
            {
              text: `"I cannot risk a dark night. Not even one."`,
              effect: () => {
                state.specialEvents.builderReinforce = true;
                state.hope -= 3;
                addLog(`${p.name} proposed upgrading the lighthouse. You chose to keep the light burning.`);
                state.choicesMade.push({ week: state.week, choice: 'builder_reinforce_no', person: p.name });
              }
            }
          ]
        });
      }
    }
  });
  return unlocks;
}

      if (state.population.length > 0) {
        state.hope += 4;
        const person = state.population[Math.floor(Math.random() * state.population.length)];
        if (person) addTrust(person.name, 5);
      } else {
        state.hope += 2;
      }
    }
  }
];

// ====== HELPER FUNCTIONS ======

function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

function addLog(text) {
  state.log.unshift({ week: state.week, text: text });
  if (state.log.length > 50) state.log.pop();
}

function updateResources() {
  state.fuel = clamp(state.fuel, 0, 100);
  state.food = clamp(state.food, 0, 100);
  state.materials = clamp(state.materials, 0, 100);
  state.hope = clamp(state.hope, 0, 100);

  document.getElementById('fuel-val').textContent = state.fuel;
  document.getElementById('food-val').textContent = state.food;
  document.getElementById('mat-val').textContent = state.materials;
  document.getElementById('hope-val').textContent = state.hope;

  document.getElementById('fuel-bar').style.width = state.fuel + '%';
  document.getElementById('food-bar').style.width = state.food + '%';
  document.getElementById('mat-bar').style.width = state.materials + '%';
  document.getElementById('hope-bar').style.width = state.hope + '%';

  document.getElementById('week-display').textContent = 'Week ' + state.week;

  // Update weather display
  const weatherEl = document.getElementById('weather-display');
  if (weatherEl && state.weather) {
    const w = WEATHER_TYPES[state.weather];
    if (w) weatherEl.innerHTML = `<span class="weather-icon">${w.icon}</span> ${w.name}`;
  }
}

function setPhase(phase) {
  state.phase = phase;
  document.body.className = 'phase-' + phase;
  const phaseNames = { dawn: 'Dawn', day: 'Day', dusk: 'Dusk', night: 'Night' };
  document.getElementById('phase-display').textContent = phaseNames[phase];
}

function updateSidePanel() {
  // Islanders
  let islanderHTML = '';
  if (state.population.length === 0) {
    islanderHTML = '<div class="islander-card"><span class="text-dim">You are alone.</span></div>';
  }
  state.population.forEach(p => {
    const assignment = state.assignments[p.name] || 'unassigned';
    const trust = getTrust(p.name);
    const trustWidth = trust + '%';
    islanderHTML += `<div class="islander-card">
      <span class="name">${p.name}</span>
      <span class="role"> / ${p.skill}</span>
      <div class="trust-bar-container"><div class="trust-bar" style="width:${trustWidth}"></div></div>
      <span class="trust-label">${trust >= 80 ? 'Devoted' : trust >= 60 ? 'Deep Trust' : trust >= 30 ? 'Trusted' : 'Acquainted'}</span>
      <div class="mood">${p.mood} | Task: ${assignment}</div>
    </div>`;
  });
  document.getElementById('islander-list').innerHTML = islanderHTML;

  // Buildings
  let buildingHTML = '';
  if (state.gardenBuilt) buildingHTML += '<div class="building-item"><span class="b-name">Garden</span> - Growing food</div>';
  if (state.infirmaryBuilt) buildingHTML += '<div class="building-item"><span class="b-name">Infirmary</span> - Medical care</div>';
  if (state.wallBuilt) buildingHTML += '<div class="building-item"><span class="b-name">Sea Wall</span> - Storm protection</div>';
  if (state.dockBuilt) buildingHTML += '<div class="building-item"><span class="b-name">Dock</span> - Ship landing</div>';
  if (state.lighthouseUpgraded) buildingHTML += '<div class="building-item"><span class="b-name">Lighthouse (Upgraded)</span> - Efficient operation</div>';
  if (state.workshopBuilt) buildingHTML += '<div class="building-item"><span class="b-name">Workshop</span> - Crafting & repairs</div>';
  if (state.watchtowerBuilt) buildingHTML += '<div class="building-item"><span class="b-name">Watchtower</span> - Lookout & forecasting</div>';
  if (state.chapelBuilt) buildingHTML += '<div class="building-item"><span class="b-name">Chapel</span> - Quiet hope</div>';
  if (state.stormShelterBuilt) buildingHTML += '<div class="building-item"><span class="b-name">Storm Shelter</span> - 50% storm protection</div>';
  if (!buildingHTML) buildingHTML = '<div class="building-item text-dim">No structures built yet.</div>';
  document.getElementById('building-list').innerHTML = buildingHTML;

  // Log
  let logHTML = '';
  state.log.slice(0, 15).forEach(entry => {
    logHTML += `<div class="log-entry"><span class="log-week">Week ${entry.week}</span><br>${entry.text}</div>`;
  });
  if (!logHTML) logHTML = '<div class="log-entry text-dim">The log is empty.</div>';
  document.getElementById('keeper-log').innerHTML = logHTML;
}

function renderContent(html) {
  const main = document.getElementById('main-content');
  main.innerHTML = html;
  main.scrollTop = 0;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function togglePanel() {
  const panel = document.getElementById('side-panel');
  panel.classList.toggle('hidden');
  updateSidePanel();
}

function showJournal() {
  const modal = document.getElementById('journal-modal');
  let html = '';
  if (state.journalFound.length === 0) {
    html = '<p>You have not yet found any entries from the previous keeper\'s journal. They may be hidden around the lighthouse, washed ashore, or discovered during repairs.</p>';
  } else {
    state.journalFound.sort((a, b) => a - b).forEach(id => {
      const entry = JOURNAL_ENTRIES.find(e => e.id === id);
      if (entry) {
        html += `<div class="journal-entry"><strong>${entry.title}</strong><br><br>${entry.text}</div>`;
      }
    });
  }
  document.getElementById('journal-entries').innerHTML = html;
  modal.classList.add('active');
}

function closeJournal() {
  document.getElementById('journal-modal').classList.remove('active');
}

// Weather effects
function startRain(intensity, weatherType) {
  const rain = document.getElementById('rain-overlay');
  rain.innerHTML = '';
  rain.className = 'rain';
  const count = intensity === 'heavy' ? 120 : intensity === 'medium' ? 60 : 30;
  const adjustedCount = weatherType === 'hurricane' ? count * 2 : weatherType === 'tempest' ? Math.floor(count * 1.5) : count;
  for (let i = 0; i < adjustedCount; i++) {
    const drop = document.createElement('div');
    drop.className = 'raindrop';
    drop.style.left = Math.random() * 100 + '%';
    const speed = weatherType === 'hurricane' ? (0.2 + Math.random() * 0.2) :
                  weatherType === 'tempest' ? (0.3 + Math.random() * 0.3) :
                  (0.4 + Math.random() * 0.4);
    drop.style.animationDuration = speed + 's';
    drop.style.animationDelay = Math.random() * 2 + 's';
    const height = weatherType === 'hurricane' ? (18 + Math.random() * 20) :
                   weatherType === 'gale' ? (14 + Math.random() * 18) :
                   (10 + Math.random() * 15);
    drop.style.height = height + 'px';
    rain.appendChild(drop);
  }
  if (weatherType) {
    rain.classList.add('intensity-' + weatherType);
  }
  rain.classList.add('active');
}

function stopRain() {
  document.getElementById('rain-overlay').classList.remove('active');
}

function flashLightning() {
  const flash = document.getElementById('lightning-flash');
  flash.classList.remove('flash');
  void flash.offsetWidth;
  flash.classList.add('flash');
}

function setFog(active) {
  document.getElementById('fog-overlay').classList.toggle('active', active);
}

      <p>The lighthouse is old, built from stone that does not match any quarry on the coast. The mechanism works, gears turning with a patience that borders on stubbornness. The lantern burns whale oil, and the supply room holds enough for a few weeks. After that, you will need to find more. Or the light goes out.</p>

      <p>On the desk in the keeper's quarters, you find a journal. The first entry reads: "Tend the light. Do not ask why."</p>

      <p>You tend the light.</p>

      <div class="choices">
