<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#2d1a0f"/>
      <stop offset="55%" stop-color="#1a0e08"/>
      <stop offset="100%" stop-color="#080403"/>
    </radialGradient>

    <linearGradient id="bodyWarm" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#e8a46d"/>
      <stop offset="40%" stop-color="#cc8450"/>
      <stop offset="100%" stop-color="#a0603a"/>
    </linearGradient>

    <linearGradient id="wingDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a06840"/>
      <stop offset="100%" stop-color="#6b3e22"/>
    </linearGradient>

    <linearGradient id="bellyLight" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ecc09a"/>
      <stop offset="100%" stop-color="#d4a070"/>
    </linearGradient>

    <radialGradient id="forgeUp" cx="50%" cy="100%" r="65%">
      <stop offset="0%" stop-color="#ff6b2b" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#cc4400" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#cc4400" stop-opacity="0"/>
    </radialGradient>

    <filter id="warmRim" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#ff8844" flood-opacity="0.12" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="sparkGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#forgeUp)"/>

  <!-- Anvil - minimal, grounding -->
  <g opacity="0.75">
    <path d="M120 408 L135 385 L160 376 L358 376 L383 385 L398 408 Z" fill="#221510"/>
    <path d="M120 408 L90 402 L88 410 L120 415 Z" fill="#1c100c"/>
    <path d="M140 408 L128 440 L382 440 L370 408 Z" fill="#180e0a"/>
    <path d="M122 440 L118 458 L395 458 L391 440 Z" fill="#140c08"/>
    <line x1="160" y1="376" x2="358" y2="376" stroke="#3a2215" stroke-width="1.5"/>
  </g>

  <!-- THE WREN - scaled up to fill frame -->
  <g filter="url(#warmRim)" transform="translate(260, 250) scale(1.2)">

    <!-- Body -->
    <ellipse cx="0" cy="0" rx="80" ry="65" fill="url(#bodyWarm)" transform="rotate(-5)"/>

    <!-- Belly -->
    <ellipse cx="-15" cy="15" rx="50" ry="48" fill="url(#bellyLight)" opacity="0.5" transform="rotate(-3)"/>

    <!-- Head -->
    <circle cx="-68" cy="-48" r="44" fill="url(#bodyWarm)"/>

    <!-- Cheek -->
    <circle cx="-78" cy="-36" r="24" fill="#e8b888" opacity="0.4"/>

    <!-- Crown -->
    <path d="M-40 -68 Q-68 -92 -100 -65 Q-105 -55 -95 -48" fill="#8b5535" opacity="0.5"/>

    <!-- Eyebrow stripe -->
    <path d="M-50 -62 Q-72 -70 -102 -58" stroke="#ecc89e" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>

    <!-- Eye -->
    <circle cx="-82" cy="-52" r="9" fill="#0d0604"/>
    <circle cx="-82" cy="-52" r="10.5" fill="none" stroke="#1a0e08" stroke-width="1.5"/>
    <circle cx="-82" cy="-52" r="6.5" fill="#1a1008"/>
    <!-- Forge light in the eye -->
    <circle cx="-84.5" cy="-55.5" r="3" fill="#ffaa66"/>
    <circle cx="-80" cy="-54" r="1.2" fill="#ffffff" opacity="0.7"/>

    <!-- Beak -->
    <path d="M-108 -48 L-135 -40 L-108 -36 Z" fill="#5a3828"/>
    <path d="M-108 -44 L-133 -40" stroke="#4a2a1a" stroke-width="0.8" fill="none"/>

    <!-- Neck -->
    <ellipse cx="-38" cy="-22" rx="30" ry="35" fill="url(#bodyWarm)" transform="rotate(12, -38, -22)"/>

    <!-- Wing -->
    <path d="M-10 -40 Q40 -30 72 10 Q50 30 15 38 Q-20 20 -10 -40 Z" fill="url(#wingDark)"/>

    <!-- Wing coverts -->
    <path d="M-5 -30 Q30 -22 55 0" stroke="#8a5530" stroke-width="2.2" fill="none" opacity="0.5"/>
    <path d="M-8 -18 Q28 -10 60 10" stroke="#7a4825" stroke-width="2" fill="none" opacity="0.45"/>
    <path d="M-8 -6 Q25 2 55 20" stroke="#7a4825" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M-6 6 Q20 12 48 28" stroke="#6b3e22" stroke-width="1.8" fill="none" opacity="0.35"/>

    <!-- Wing barring -->
    <g stroke="#4a2818" stroke-width="1.3" opacity="0.3" fill="none">
      <path d="M20 -20 L32 -17"/>
      <path d="M30 -14 L44 -8"/>
      <path d="M40 -4 L54 3"/>
      <path d="M22 -7 L37 -1"/>
      <path d="M35 6 L50 13"/>
      <path d="M25 10 L42 17"/>
    </g>

    <path d="M-10 -40 Q40 -30 72 10" stroke="#c49060" stroke-width="1.2" fill="none" opacity="0.3"/>

    <!-- TAIL - cocked UP, bold -->
    <g transform="rotate(-50, 58, -15)">
      <path d="M58 -15 L108 -80 L116 -72 L70 -2 Z" fill="#8b5230"/>
      <path d="M55 -12 L98 -70 L106 -63 L67 -4 Z" fill="#7a4628"/>
      <path d="M52 -10 L90 -62 L97 -56 L62 -1 Z" fill="#6b3e22" opacity="0.7"/>
      <g stroke="#4a2818" stroke-width="1.5" opacity="0.4" fill="none">
        <path d="M70 -28 L96 -64"/>
        <path d="M67 -18 L92 -52"/>
        <path d="M64 -8 L85 -40"/>
      </g>
    </g>

    <!-- Legs -->
    <g stroke="#5a3828" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-18 55 L-25 92"/>
      <path d="M-25 92 L-40 103"/>
      <path d="M-25 92 L-20 105"/>
      <path d="M-25 92 L-32 106"/>
      <path d="M-25 92 L-16 97"/>

      <path d="M12 52 L18 92"/>
      <path d="M18 92 L5 103"/>
      <path d="M18 92 L22 105"/>
      <path d="M18 92 L12 106"/>
      <path d="M18 92 L28 97"/>
    </g>
  </g>

  <!-- Forge sparks -->
  <g fill="#ffaa55">
    <circle cx="175" cy="368" r="2.8" opacity="0.7"/>
    <circle cx="345" cy="358" r="2.2" opacity="0.6"/>
    <circle cx="200" cy="352" r="2" opacity="0.6"/>
    <circle cx="315" cy="370" r="1.8" opacity="0.5"/>
    <circle cx="255" cy="375" r="2.2" opacity="0.55"/>
    <circle cx="155" cy="380" r="1.5" opacity="0.4"/>
    <circle cx="360" cy="372" r="1.8" opacity="0.45"/>
    <circle cx="230" cy="362" r="1.5" opacity="0.5"/>
  </g>

  <g filter="url(#sparkGlow)" fill="#ff7733">
    <circle cx="175" cy="368" r="4" opacity="0.35"/>
    <circle cx="345" cy="358" r="3" opacity="0.3"/>
    <circle cx="200" cy="352" r="3" opacity="0.25"/>
    <circle cx="315" cy="370" r="2.5" opacity="0.2"/>
    <circle cx="255" cy="375" r="3" opacity="0.25"/>
  </g>

  <!-- Rising sparks -->
  <g fill="#ff8844">
    <circle cx="210" cy="300" r="1.5" opacity="0.2"/>
    <circle cx="320" cy="285" r="1.2" opacity="0.18"/>
    <circle cx="185" cy="275" r="1" opacity="0.14"/>
    <circle cx="345" cy="310" r="1.2" opacity="0.16"/>
    <circle cx="265" cy="250" r="0.9" opacity="0.1"/>
    <circle cx="170" cy="260" r="1" opacity="0.12"/>
  </g>

  <!-- Fading high sparks -->
  <g fill="#ff6633">
    <circle cx="235" cy="195" r="0.8" opacity="0.07"/>
    <circle cx="310" cy="210" r="0.6" opacity="0.05"/>
    <circle cx="190" cy="185" r="0.6" opacity="0.04"/>
  </g>
</svg>